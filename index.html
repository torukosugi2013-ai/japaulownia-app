<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ジャパロニア 圃場ビューア（クラウド版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1e8;--paper:#fbfaf4;--ink:#23291f;--muted:#6f7560;--line:#dcd7c4;--forest:#2f4a32;--forest2:#3e6043;--leaf:#6f8f4e;--gold:#c08a2d;--danger:#a8402f;--shadow:0 1px 2px rgba(35,41,31,.06),0 10px 30px rgba(35,41,31,.08)}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:"Zen Kaku Gothic New",system-ui,sans-serif;color:var(--ink);min-height:100vh;background:radial-gradient(1200px 500px at 88% -12%,rgba(111,143,78,.12),transparent 60%),radial-gradient(900px 420px at -10% 110%,rgba(154,107,59,.08),transparent 60%),var(--bg);-webkit-font-smoothing:antialiased}
.mincho{font-family:"Shippori Mincho",serif}.mono{font-family:"JetBrains Mono",monospace}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px 60px}
header{padding:26px 0 14px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px}
.logo{width:44px;height:44px;border-radius:13px;background:linear-gradient(150deg,var(--forest),var(--forest2));display:grid;place-items:center;box-shadow:var(--shadow)}
.logo svg{width:27px;height:27px}
.brand h1{font-size:21px;margin:0;font-weight:800;color:var(--forest);letter-spacing:.03em}
.brand .sub{font-size:11px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:2px}
.sitebar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.sitebtn{display:flex;flex-direction:column;gap:2px;border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:11px 18px;cursor:pointer;box-shadow:var(--shadow);transition:.16s;min-width:150px}
.sitebtn:hover{border-color:var(--leaf)}
.sitebtn.on{background:var(--forest);border-color:var(--forest)}
.sitebtn.on .nm,.sitebtn.on .mt{color:#fff}
.sitebtn .nm{font-family:"Shippori Mincho",serif;font-weight:700;font-size:15px;color:var(--forest)}
.sitebtn .mt{font-size:11px;color:var(--muted)}
.tabs{display:flex;gap:4px;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:5px;box-shadow:var(--shadow);flex-wrap:wrap;margin-bottom:14px}
.tabs button{font-family:inherit;border:0;background:transparent;color:var(--muted);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;transition:.16s}
.tabs button:hover{color:var(--ink)}
.tabs button.on{background:var(--forest2);color:#fff}
.controls{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.ctl{display:flex;flex-direction:column;gap:6px}
.ctl .lab{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;box-shadow:var(--shadow);flex-wrap:wrap}
.seg button{border:0;background:transparent;font-family:inherit;font-weight:700;font-size:12.5px;padding:8px 13px;cursor:pointer;color:var(--muted);transition:.15s}
.seg button.on{background:var(--forest);color:#fff}.seg button:disabled{opacity:.3;cursor:not-allowed}
.regchip{font-size:12px;font-weight:700;color:var(--gold);background:rgba(192,138,45,.12);border:1px solid rgba(192,138,45,.4);border-radius:10px;padding:9px 14px}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:11px 16px;box-shadow:var(--shadow);min-width:118px}
.stat .k{font-size:10.5px;color:var(--muted);font-weight:700}
.stat .v{font-size:21px;font-weight:800;color:var(--forest);font-family:"Shippori Mincho",serif;line-height:1.1;margin-top:3px}
.stat .v small{font-size:11px;color:var(--muted);font-weight:500;margin-left:3px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:20px;margin-bottom:14px}
.card h2{font-family:"Shippori Mincho",serif;font-size:16px;margin:0 0 3px;color:var(--forest)}
.card .lead{font-size:12px;color:var(--muted);margin:0 0 14px}
.maparea{background:repeating-linear-gradient(0deg,#fcfbf5,#fcfbf5 1px,transparent 1px,transparent 26px),repeating-linear-gradient(90deg,#fcfbf5,#fcfbf5 1px,transparent 1px,transparent 26px),#fdfcf6;border:1px solid var(--line);border-radius:14px;padding:10px}
svg circle{cursor:pointer;transition:transform .12s;transform-box:fill-box;transform-origin:center}
svg circle:hover{transform:scale(1.55)}
svg circle.dotsel{stroke:var(--gold);stroke-width:3}
.legend{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-top:12px;flex-wrap:wrap}
.legendbar{height:10px;width:150px;border-radius:6px;background:linear-gradient(90deg,#e9efd8,#2f4a32)}
.sw{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:4px;vertical-align:-1px}
.drawer{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;background:var(--paper);border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(35,41,31,.16);transform:translateX(105%);transition:transform .32s cubic-bezier(.4,0,.2,1);z-index:40;overflow-y:auto;padding:24px}
.drawer.open{transform:none}
.drawer .x{position:absolute;top:16px;right:16px;border:1px solid var(--line);background:#fff;border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:18px;color:var(--muted)}
.dtag{font-family:"Shippori Mincho",serif;font-size:22px;font-weight:800;color:var(--forest)}
.dpos{font-size:12px;color:var(--muted);margin-top:2px}
.depc{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--muted);word-break:break-all;margin-top:6px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 9px}
.sub{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin:20px 0 9px;border-bottom:1px solid var(--line);padding-bottom:6px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:right;font-size:10px;color:var(--muted);font-weight:700;padding:7px 6px;border-bottom:2px solid var(--line)}th:first-child{text-align:left}
td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;font-family:"JetBrains Mono",monospace;font-size:12px}
td:first-child{text-align:left;font-family:inherit;font-weight:700}tr:last-child td{border-bottom:0}
.co2{color:var(--forest);font-weight:700}
.spark{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px}
input{font-family:inherit;font-size:13px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 10px;width:100%}
input:focus{outline:0;border-color:var(--leaf);box-shadow:0 0 0 3px rgba(111,143,78,.18)}
select{font-family:inherit;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 10px}
button.act{font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer;border:0;border-radius:9px;padding:9px 14px;background:var(--forest);color:#fff;white-space:nowrap}
button.act:hover{background:var(--forest2)}
button.act.gh{background:#fff;color:var(--forest);border:1px solid var(--forest)}
button.act.sm{padding:6px 10px;font-size:11.5px}
.del{background:#fff;color:var(--danger);border:1px solid #e3b7b7;border-radius:8px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer}
.scrim{position:fixed;inset:0;background:rgba(35,41,31,.28);opacity:0;pointer-events:none;transition:.3s;z-index:35}.scrim.on{opacity:1;pointer-events:auto}
.banner{background:linear-gradient(120deg,rgba(192,138,45,.10),rgba(111,143,78,.08));border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:12px;padding:12px 15px;font-size:12px;color:#5a5234;line-height:1.6}
.center{min-height:90vh;display:flex;align-items:center;justify-content:center;padding:18px}
.auth{width:380px;max-width:94vw}
footer{text-align:center;color:var(--muted);font-size:11px;margin-top:24px;padding-top:18px;border-top:1px solid var(--line);line-height:1.7}
.ok{color:var(--forest2);font-size:12px}.bad{color:var(--danger);font-size:12px}
.gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.phitem{display:flex;flex-direction:column;gap:4px}
.ph{position:relative;border:1px solid var(--line);border-radius:10px;overflow:hidden;aspect-ratio:4/3;background:#f7f5ee}
.ph .phdel{position:absolute;top:5px;right:5px;width:26px;height:26px;border-radius:50%;border:0;background:rgba(20,24,18,.72);color:#fff;font-size:16px;line-height:26px;cursor:pointer;z-index:5;padding:0}
.phbroken{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f3f1e9;color:var(--danger);font-size:11px;text-align:center;padding:6px;pointer-events:none;z-index:1}
.ph img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;display:block}
.phcap{text-align:center;font-size:12px;color:var(--ink);font-family:"JetBrains Mono",monospace}
.phcap .capdate{cursor:pointer;border-bottom:1px dotted var(--muted)}
.emptyph{grid-column:1/-1;text-align:center;color:var(--muted);font-size:12px;padding:18px;border:1px dashed var(--line);border-radius:10px;background:#fffdf6}
.lightbox{position:fixed;inset:0;background:rgba(20,24,18,.86);display:none;align-items:center;justify-content:center;z-index:60;cursor:zoom-out;padding:30px}
.lightbox.on{display:flex;flex-direction:column;gap:10px}.lightbox img{max-width:94vw;max-height:84vh;border-radius:10px}.lightbox .lbcap{color:#fff;font-family:"JetBrains Mono",monospace;font-size:13px;background:rgba(0,0,0,.45);padding:5px 12px;border-radius:8px}
</style>
</head>
<body>
<div id="root"><div class="center"><div class="mono" style="color:var(--muted)">読み込み中…</div></div></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import L from 'https://esm.sh/leaflet@1.9.4';
const SUPABASE_URL='https://bieamtjesoaimlmrtmfj.supabase.co';   // デプロイ時はここに直書きしてもよい
const SUPABASE_ANON='sb_publishable_-paeLD0LA0CMmMmDKhXVEg_YN_Y0OGx';
const LEAF='<svg viewBox="0 0 24 24" fill="none"><path d="M12 21v-6" stroke="#cfe0b8" stroke-width="1.8" stroke-linecap="round"/><path d="M12 15c-3.6 0-5.2-2.2-5.2-4.6C6.8 8.4 8 7.6 8 6c1.4.6 2 1.8 2 1.8S10.4 3 12 2c1.6 1 2 5.8 2 5.8s.6-1.2 2-1.8c0 1.6 1.2 2.4 1.2 4.4C17.2 12.8 15.6 15 12 15Z" fill="#9fc06f"/></svg>';

const P={cfL:0.452,cfB:0.417,cfS:0.474,cfR:0.456};
function co2(m){if(!m)return null;let dbh=(m.dbh_cm!=null&&m.dbh_cm!=='')?+m.dbh_cm:null;let d0=(m.root_d_cm!=null&&m.root_d_cm!=='')?+m.root_d_cm:null;let est=false;if(dbh==null&&d0!=null){dbh=(d0-1.6721)/1.2663;est=true;}if(dbh==null)return null;if(d0==null)d0=1.2663*dbh+1.6721;let h=(m.height_m!=null&&m.height_m!=='')?(+m.height_m*100):null;if(h==null){h=41.306*d0+53.998;est=true;}const X=dbh*dbh*h;const WL=.001*X**.7197,WB=.0005*X**.7375,WS=.0007*X**.8221,WR=.0011*(d0*d0)**1.602;return{kg:(WL*P.cfL+WB*P.cfB+WS*P.cfS+WR*P.cfR)*(44/12),est};}
const fmt=(n,d=1)=>(n==null||isNaN(n))?'–':Number(n).toLocaleString('ja-JP',{maximumFractionDigits:d});
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const el=id=>document.getElementById(id);
const root=el('root');
function heat(t){const a=[233,239,216],b=[47,74,50];const c=a.map((x,i)=>Math.round(x+(b[i]-x)*Math.max(0,Math.min(1,t))));return`rgb(${c[0]},${c[1]},${c[2]})`;}

let sb=null;
let pendingPhotos=[];
let S={session:null,sites:[],site:null,fields:[],trees:[],meas:[],tab:'jp',field:null,metric:'co2',round:'latest',compare:false,photoDate:null,selTree:null,entryField:null,entryDate:new Date().toISOString().slice(0,10)};

init();
function getCfg(k,c){return (c&&!c.includes('ここに')&&c.trim())?c:(localStorage.getItem(k)||'');}
async function init(){const url=getCfg('jp_sb_url',SUPABASE_URL),key=getCfg('jp_sb_key',SUPABASE_ANON);if(!url||!key){renderSetup();return;}sb=createClient(url,key,{auth:{storage:window.sessionStorage,persistSession:true,autoRefreshToken:true}});const {data}=await sb.auth.getSession();S.session=data.session;sb.auth.onAuthStateChange((_e,s)=>{S.session=s;s?afterLogin():render();});S.session?afterLogin():render();}
function frame(inner){return `<div class="center"><div class="card auth"><div class="brand" style="margin-bottom:14px"><div class="logo">${LEAF}</div><div><h1 class="mincho" style="font-size:18px;color:var(--forest);margin:0">ジャパロニア</h1><div class="sub">植林CO₂管理 クラウド</div></div></div>${inner}</div></div>`;}
function renderSetup(){root.innerHTML=frame(`<h2 class="mincho" style="color:var(--forest)">初回設定</h2><p class="lead" style="font-size:12px;color:var(--muted)">SupabaseのURLとキー（anon/publishable）を貼ってください。この端末に記憶され次回以降は不要です。</p><label class="sub" style="border:0;margin:8px 0 4px">Project URL</label><input id="c_url" placeholder="https://xxxx.supabase.co"><label class="sub" style="border:0;margin:10px 0 4px">anon / publishable キー</label><input id="c_key" placeholder="eyJ... / sb_publishable_..."><button class="act" id="c_save" style="margin-top:12px;width:100%">保存して始める</button>`);el('c_save').onclick=()=>{const u=el('c_url').value.trim(),k=el('c_key').value.trim();if(!u||!k){alert('両方入れてください');return;}localStorage.setItem('jp_sb_url',u);localStorage.setItem('jp_sb_key',k);location.reload();};}
async function afterLogin(){await loadSites();render();}
async function loadSites(){const {data,error}=await sb.from('sites').select('*').order('name');if(error){alert('読込エラー: '+error.message);return;}S.sites=data||[];if(!S.site&&S.sites.length)S.site=S.sites[0].id;if(S.site)await loadSite(S.site);}
async function loadSite(id){S.site=id;const {data:fields}=await sb.from('fields').select('*, parcels(*)').eq('site_id',id).order('name');S.fields=fields||[];if((!S.field||!S.fields.find(f=>f.id===S.field))&&S.fields.length)S.field=S.fields[0].id;if((!S.entryField||!S.fields.find(f=>f.id===S.entryField))&&S.fields.length)S.entryField=S.fields[0].id;const fids=S.fields.map(f=>f.id);S.trees=fids.length?((await sb.from('trees').select('*').in('field_id',fids).limit(100000)).data||[]):[];const tids=S.trees.map(t=>t.id);S.meas=[];for(let i=0;i<tids.length;i+=150){const r=await sb.from('measurements').select('*').in('tree_id',tids.slice(i,i+150)).order('measured_on');if(r.data)S.meas=S.meas.concat(r.data);}const seen={},dd=[];const sc=x=>(x.co2_kg!=null?2:0)+(x.height_m!=null?1:0)+(x.dbh_cm!=null?1:0)+(x.root_d_cm!=null?1:0);S.meas.forEach(m=>{const k=m.tree_id+'|'+m.measured_on;if(!(k in seen)){seen[k]=dd.length;dd.push(m);}else if(sc(m)>sc(dd[seen[k]])){dd[seen[k]]=m;}});S.meas=dd.sort((a,b)=>String(a.measured_on).localeCompare(String(b.measured_on)));}

function treeMeas(tid){return S.meas.filter(m=>m.tree_id===tid);}
function measFor(tid,round){const ms=treeMeas(tid);if(!ms.length)return null;if(round==='latest')return ms[ms.length-1];return ms.find(m=>m.measured_on===round)||null;}
function metricVal(tid,round,metric){const m=measFor(tid,round);if(!m)return null;if(metric==='co2'){const c=co2(m);return c?c.kg:(m.co2_kg??null);}if(metric==='h')return m.height_m;if(metric==='dbh')return m.dbh_cm;return null;}
function fieldRounds(f){const tids=S.trees.filter(t=>t.field_id===f.id).map(t=>t.id);const set=new Set();S.meas.forEach(m=>{if(tids.includes(m.tree_id))set.add(m.measured_on);});return[...set].sort();}
const val=(k,tid)=>{const e=document.querySelector(`[data-tid="${tid}"][data-k="${k}"]`);return e?e.value:'';};
function seg(id,opts,cur){return `<div class="seg" data-seg="${id}">`+opts.map(([v,l])=>`<button class="${v===cur?'on':''}" data-v="${esc(v)}">${esc(l)}</button>`).join('')+`</div>`;}

function render(){
  if(!S.session){renderLogin();return;}
  const content=S.tab==='jp'?viewJp():S.tab==='map'?viewMap():S.tab==='entry'?viewEntry():S.tab==='photos'?viewPhotos():viewDash();
  const sites=S.sites.map(s=>`<div class="sitebtn ${s.id===S.site?'on':''}" data-site="${esc(s.id)}"><span class="nm">${esc(s.name)}</span><span class="mt">${S.site===s.id?S.fields.length+' 圃場':''}</span></div>`).join('');
  root.innerHTML=`<div class="wrap">
    <header><div class="brand"><div class="logo">${LEAF}</div><div><h1 class="mincho">ジャパロニア 圃場ビューア</h1><div class="sub">Cloud · Map · Growth</div></div></div>
      <div style="display:flex;align-items:center;gap:10px"><span class="mono" style="font-size:11px;color:var(--muted)">${esc(S.session.user.email||'')}</span><button class="act gh sm" id="logout">ログアウト</button></div></header>
    <div class="sitebar">${sites||'<span class="lead">拠点なし</span>'}</div>
    <div class="tabs"><button class="${S.tab==='jp'?'on':''}" data-tab="jp">全国マップ</button><button class="${S.tab==='map'?'on':''}" data-tab="map">圃場マップ</button><button class="${S.tab==='entry'?'on':''}" data-tab="entry">計測入力</button><button class="${S.tab==='photos'?'on':''}" data-tab="photos">写真取込</button><button class="${S.tab==='dash'?'on':''}" data-tab="dash">ダッシュボード</button></div>
    ${content}
    <footer>ジャパロニア 植林CO₂管理 ・ 算定：中根(2008) 相対成長式 ・ データはSupabaseに保存 ・ <span class="mono" style="color:var(--gold)">版 0605-c（キャッシュ無効化・閉じたら要ログイン）</span></footer>
  </div>
  <div class="scrim" id="scrim"></div><div class="drawer" id="drawer"></div><div class="lightbox" id="lb"><img><div class="lbcap" id="lbcap"></div></div>`;
  el('logout').onclick=async()=>{await sb.auth.signOut();S.site=null;S.field=null;};
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;render();});
  document.querySelectorAll('[data-site]').forEach(b=>b.onclick=async()=>{S.site=b.dataset.site;S.field=null;S.entryField=null;await loadSite(S.site);render();});
  const sc=el('scrim');if(sc)sc.onclick=closeDrawer;const lb=el('lb');if(lb)lb.onclick=()=>lb.classList.remove('on');
  bind();
}
function renderLogin(){root.innerHTML=frame(`<h2 class="mincho" style="color:var(--forest)">ログイン</h2><label class="sub" style="border:0;margin:8px 0 4px">メールアドレス</label><input id="email" type="email"><label class="sub" style="border:0;margin:10px 0 4px">パスワード</label><input id="pw" type="password"><div style="margin-top:12px;display:flex;gap:8px"><button class="act" id="login" style="flex:1">ログイン</button><button class="act gh" id="signup">新規登録</button></div><div id="msg" style="margin-top:8px"></div><button class="act gh sm" id="reset" style="margin-top:12px">接続先を変更</button>`);
  el('login').onclick=async()=>{const {error}=await sb.auth.signInWithPassword({email:el('email').value.trim(),password:el('pw').value});el('msg').innerHTML=error?`<span class="bad">${esc(error.message)}</span>`:`<span class="ok">OK</span>`;};
  el('signup').onclick=async()=>{const {error}=await sb.auth.signUp({email:el('email').value.trim(),password:el('pw').value});el('msg').innerHTML=error?`<span class="bad">${esc(error.message)}</span>`:`<span class="ok">登録しました。確認メールが届く場合があります。</span>`;};
  el('reset').onclick=()=>{localStorage.removeItem('jp_sb_url');localStorage.removeItem('jp_sb_key');location.reload();};}

/* ===== 全国マップ ===== */
function viewJp(){
  const withxy=S.sites.filter(s=>s.lat!=null&&s.lng!=null);
  const note=withxy.length?'':'<div class="banner">拠点の緯度経度が未設定です。<b>migrate_拠点座標.sql</b> をSupabaseで実行すると、地図に拠点が表示されます。</div>';
  return `<div class="card"><h2>全国マップ</h2><p class="lead">拠点のピンをクリックすると概要が出ます。「この拠点を開く」で圃場マップへ。ピンはドラッグで位置を微調整でき、離すと保存されます。</p>

/* ===== 圃場マップ ===== */
function viewMap(){
  if(!S.fields.length) return `<div class="card"><p class="lead">この拠点に圃場がありません。</p></div>`;
  const f=S.fields.find(x=>x.id===S.field)||S.fields[0];
  const fieldSeg=seg('field',S.fields.map(x=>[x.id,x.name]),f.id);
  const metricSeg=seg('metric',[['co2','CO₂'],['h','樹高'],['dbh','DBH']],S.metric);
  const rounds=fieldRounds(f);
  const roundSeg=seg('round',[['latest','最新']].concat(rounds.map(r=>[r,r.slice(5).replace('-','/')])),S.round);
  const trees=S.trees.filter(t=>t.field_id===f.id);
  const cv=trees.map(t=>metricVal(t.id,S.round,'co2')).filter(v=>v!=null);
  const hv=trees.map(t=>metricVal(t.id,S.round,'h')).filter(v=>v!=null);
  const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
  const stats=[['個体数',trees.length,'',0],['計測済',cv.length,'',0],['平均樹高',avg(hv),'m',2],['平均CO₂',avg(cv),'kg',2],['合計CO₂',cv.reduce((a,b)=>a+b,0),'kg',0]];
  const viewSeg=seg('view',[['single','1つ'],['compare','2つ並べて（樹高×CO₂）']],S.compare?'compare':'single');
  const cl=m=>m==='co2'?'CO₂':m==='h'?'樹高':'DBH';
  const ctrls=`<div class="controls">
     <div class="ctl"><span class="lab">圃場</span>${fieldSeg}</div>
     ${S.compare?'':`<div class="ctl"><span class="lab">色（指標）</span>${metricSeg}</div>`}
     <div class="ctl"><span class="lab">表示</span>${viewSeg}</div>
     <div class="ctl"><span class="lab">計測回</span>${roundSeg}</div>
     <span class="regchip">${esc(f.mrv_status||'—')}${f.rfid_managed?' · RFID':''}</span></div>`;
  const statsHtml=`<div class="stats">${stats.map(([k,v,u,d])=>`<div class="stat"><div class="k">${k}</div><div class="v">${fmt(v,d)}<small>${u}</small></div></div>`).join('')}</div>`;
  const maps=S.compare
   ? `<div class="card"><h2>${esc(f.name)} ・ <span style="color:var(--leaf)">色＝樹高</span></h2><p class="lead">濃いほど樹高が大きい。点クリックで個体の詳細。</p>${buildMap(f,'h','H')}</div>
      <div class="card"><h2>${esc(f.name)} ・ <span style="color:var(--gold)">色＝CO₂</span></h2><p class="lead">濃いほどCO₂吸収量が大きい。点クリックで個体の詳細。</p>${buildMap(f,'co2','C')}</div>`
   : `<div class="card"><h2>${esc(f.name)}</h2><p class="lead">点をクリックすると個体の計測履歴とCO₂推移が右に開きます。色の濃さ＝${cl(S.metric)}の大小。</p>${buildMap(f,S.metric,'')}</div>`;
  return `${ctrls}${statsHtml}${maps}${parcelCard(f)}`;
}
function buildMap(f,metric,idsuf){metric=metric||S.metric;idsuf=idsuf||'';
  const trees=S.trees.filter(t=>t.field_id===f.id);
  if(!trees.length) return `<div class="banner">この圃場に個体データがありません。<b>migrate_個体と計測.sql</b> をSupabaseで実行すると表示されます。</div>`;
  const grid=(trees[0].pos_ew!=null);
  const vals=trees.map(t=>metricVal(t.id,S.round,metric)).filter(v=>v!=null);
  const mn=vals.length?Math.min(...vals):0,mx=vals.length?Math.max(...vals):1;
  const norm=v=>mx>mn?(v-mn)/(mx-mn):0.5;
  const unit=metric==='co2'?'kg':(metric==='h'?'m':'cm');
  let W,H,pos,r;
  if(grid){const cols=Math.max(...trees.map(t=>t.pos_ew||1)),rows=Math.max(...trees.map(t=>t.pos_ns||1));const cs=26,pad=14;W=cols*cs+pad*2;H=rows*cs+pad*2;pos=t=>[pad+((t.pos_ew||1)-0.5)*cs,pad+(rows-(t.pos_ns||1)+0.5)*cs];r=9;}
  else{const xs=trees.map(t=>+t.x),ys=trees.map(t=>+t.y);const xmn=Math.min(...xs),xmx=Math.max(...xs),ymn=Math.min(...ys),ymx=Math.max(...ys);const dw=(xmx-xmn)||1,dh=(ymx-ymn)||1;const pad=26,headH=24;W=900;H=Math.max(240,Math.round(W*dh/dw)+headH);pos=t=>[pad+((+t.x-xmn)/dw)*(W-2*pad),pad+headH+((+t.y-ymn)/dh)*(H-2*pad-headH)];r=9;}
  const circles=trees.map(t=>{const[cx,cy]=pos(t);const v=metricVal(t.id,S.round,metric);const fill=v==null?'#d8d3c4':heat(norm(v));return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r}" fill="${fill}" data-id="${t.id}"><title>${esc(t.label||'')} ${v==null?'(計測なし)':fmt(v,2)+unit}</title></circle>`;}).join('');
  let overlay='';
  if(!grid){
    const byCol={};trees.forEach(t=>{const c=(String(t.label).match(/^[A-Za-z]+/)||[''])[0];(byCol[c]=byCol[c]||[]).push(t);});
    const cols=Object.keys(byCol).sort((a,b)=>pos(byCol[a][0])[0]-pos(byCol[b][0])[0]);
    overlay+=cols.map(c=>`<text x="${pos(byCol[c][0])[0].toFixed(1)}" y="17" text-anchor="middle" font-family="Shippori Mincho,serif" font-weight="700" font-size="16" fill="#2f4a32">${esc(c)}</text>`).join('');
    overlay+=trees.map(t=>{const[cx,cy]=pos(t);const num=(String(t.label).match(/\d+$/)||[''])[0];return `<text x="${cx.toFixed(1)}" y="${(cy+3).toFixed(1)}" text-anchor="middle" font-size="8.5" font-family="JetBrains Mono" fill="#fff" stroke="#33372b" stroke-width="0.6" style="paint-order:stroke" pointer-events="none">${num}</text>`;}).join('');
  }
  return `<div class="maparea"><svg id="mapsvg${idsuf}" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:78vh" preserveAspectRatio="xMidYMid meet">${circles}${overlay}</svg></div>
   <div class="legend"><span>少</span><span class="legendbar"></span><span>多</span><span class="mono">${fmt(mn,2)}–${fmt(mx,2)} ${unit}</span><span style="margin-left:auto"><span class="sw" style="background:#d8d3c4"></span>計測なし</span></div>`;
}
function sparkChart(ms){const W=360,H=120,pad=22;const vals=ms.map(m=>{const c=co2(m);return c?c.kg:0;});const mx=Math.max(1,...vals);const n=ms.length;const bw=(W-pad*2)/n*0.5;const bars=ms.map((m,i)=>{const v=vals[i];const x=pad+(W-pad*2)*(n===1?0.5:i/(n-1))-bw/2;const h=(H-34)*(v/mx);const y=H-20-h;return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="#3e6043"/><text x="${(x+bw/2).toFixed(1)}" y="${(y-3).toFixed(1)}" font-size="9" text-anchor="middle" fill="#2f4a32" font-family="JetBrains Mono">${fmt(v,1)}</text><text x="${(x+bw/2).toFixed(1)}" y="${H-6}" font-size="8" text-anchor="middle" fill="#6f7560">${m.measured_on.slice(5).replace('-','/')}</text>`;}).join('');return `<svg viewBox="0 0 ${W} ${H}" width="100%">${bars}</svg>`;}
function drawerContent(t){
  const ms=treeMeas(t.id);
  const rows=ms.map(m=>{const c=co2(m);return `<tr><td>${m.measured_on}</td><td>${fmt(m.height_m,2)}</td><td>${fmt(m.dbh_cm,1)}</td><td>${fmt(m.root_d_cm,1)}</td><td class="co2">${c?fmt(c.kg,2):'–'}</td></tr>`;}).join('')||'<tr><td colspan="5" style="text-align:center;color:var(--muted)">計測記録なし</td></tr>';
  return `<button class="x" id="dx">×</button>
   <div class="dtag">${esc(t.label||t.id)}</div>
   <div class="dpos">${t.pos_ew!=null?`格子位置 EW ${t.pos_ew} · NS ${t.pos_ns}`:'座標配置'}${t.planted_date?` · 植栽 ${esc(t.planted_date)}`:''}</div>
   ${t.epc?`<div class="depc">EPC ${esc(t.epc)}</div>`:''}
   ${ms.length?`<div class="sub">CO₂の推移</div><div class="spark">${sparkChart(ms)}</div>`:''}
   <div class="sub">計測履歴</div>
   <table><thead><tr><th>計測日</th><th>樹高m</th><th>DBHcm</th><th>根元cm</th><th>CO₂kg</th></tr></thead><tbody>${rows}</tbody></table><div class="sub">写真</div><div class="gallery" id="dphotos"><span class="lead">読み込み中…</span></div><div style="display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap"><label class="act gh sm" style="cursor:pointer">＋ 写真を追加<input id="dphotofile" type="file" accept="image/*" multiple style="display:none"></label><span class="lead">撮影日 <input id="dphotodate" type="date" value="${t.planted_date||''}" style="width:148px"> （自動取得・無い時の予備）</span></div>`;

function openDrawer(tid){const t=S.trees.find(x=>x.id===tid);if(!t)return;el('drawer').innerHTML=drawerContent(t);el('drawer').classList.add('open');el('scrim').classList.add('on');document.querySelectorAll('.maparea svg circle').forEach(c=>c.classList.toggle('dotsel',c.getAttribute('data-id')===tid));const x=el('dx');if(x)x.onclick=closeDrawer;loadPhotos(t.id);bindPhotoUpload(t);}
async function loadPhotos(tid){const box=el('dphotos');if(!box)return;try{const {data,error}=await sb.from('tree_photos').select('*').eq('tree_id',tid).order('taken_on',{nullsFirst:false});if(error)throw error;if(!data||!data.length){box.innerHTML='<div class="emptyph">写真はまだありません</div>';return;}
  box.innerHTML=data.map((p,i)=>`<div class="phitem"><div class="ph"><img id="ph_${i}" alt=""><button class="phdel" data-pid="${esc(p.id)}" title="この写真を削除">×</button></div><div class="phcap"><span class="capdate" data-pid="${esc(p.id)}" title="クリックで日付を入力・修正">${esc(p.taken_on||'撮影日不明')}</span></div></div>`).join('');
  data.forEach((p,i)=>{const im=el('ph_'+i);if(!im)return;const pub=sb.storage.from('tree-photos').getPublicUrl(p.storage_path).data.publicUrl;im.src=pub;im.onclick=()=>openLb(im.src,p.taken_on||'撮影日不明');im.onerror=async()=>{im.onerror=null;try{const {data:s}=await sb.storage.from('tree-photos').createSignedUrl(p.storage_path,3600);if(s&&s.signedUrl){im.src=s.signedUrl;}else{markBroken(im);}}catch(_){markBroken(im);}};});
  box.querySelectorAll('.phdel').forEach(b=>b.onclick=async()=>{if(!confirm('この写真を削除しますか？'))return;const pid=b.dataset.pid;const row=data.find(x=>x.id===pid);if(row&&row.storage_path){try{await sb.storage.from('tree-photos').remove([row.storage_path]);}catch(_){}}await sb.from('tree_photos').delete().eq('id',pid);loadPhotos(tid);});
  box.querySelectorAll('.capdate').forEach(c=>c.onclick=async()=>{const pid=c.dataset.pid;const row=data.find(x=>x.id===pid)||{};const nv=prompt('撮影日を入力（YYYY-MM-DD。空欄で「不明」）',row.taken_on||'');if(nv===null)return;const v=nv.trim()===''?null:nv.trim();const {error}=await sb.from('tree_photos').update({taken_on:v}).eq('id',pid);if(error){alert(error.message);return;}loadPhotos(tid);});
}catch(e){box.innerHTML='<div class="emptyph">写真テーブル未作成のようです（migrate_写真セットアップ.sql を実行してください）</div>';}}
function markBroken(im){const ph=im.closest('.ph');if(!ph)return;im.style.display='none';if(!ph.querySelector('.phbroken')){const d=document.createElement('div');d.className='phbroken';d.textContent='表示できません';ph.insertBefore(d,ph.firstChild);}}
let _exifr=null;
async function getExifr(){if(_exifr!==null)return _exifr;try{_exifr=(await import('https://esm.sh/exifr@7.1.3')).default;}catch(_){_exifr=false;}return _exifr;}
function toYMD(d){const dt=(d instanceof Date)?d:new Date(d);if(isNaN(dt))return null;const z=n=>String(n).padStart(2,'0');return `${dt.getFullYear()}-${z(dt.getMonth()+1)}-${z(dt.getDate())}`;}
async function photoTakenDate(file,fallback){try{const ex=await getExifr();if(ex){const d=await ex.parse(file,['DateTimeOriginal','CreateDate','DateTimeDigitized']);const dd=d&&(d.DateTimeOriginal||d.CreateDate||d.DateTimeDigitized);const y=dd?toYMD(dd):null;if(y)return y;}}catch(_){}if(file&&file.lastModified){const y=toYMD(new Date(file.lastModified));if(y)return y;}return fallback||null;}
function bindPhotoUpload(t){const f=el('dphotofile');if(!f)return;f.onchange=async e=>{const files=[...e.target.files];const box=el('dphotos');if(box)box.innerHTML='<div class="emptyph">アップロード中…</div>';for(const fl of files){const path=`${t.id}/${Date.now()}-${fl.name.replace(/[^\w.\-]/g,'_')}`;const up=await sb.storage.from('tree-photos').upload(path,fl);if(up.error){alert('アップロード失敗: '+up.error.message);continue;}const taken=await photoTakenDate(fl,(el('dphotodate')&&el('dphotodate').value)||null);const {error}=await sb.from('tree_photos').insert({tree_id:t.id,taken_on:taken,storage_path:path,created_by:S.session.user.id});if(error){alert('記録失敗: '+error.message);}}loadPhotos(t.id);};}

   </div>`;
}
function matchTree(fn,trees){const base=fn.replace(/\.[^.]+$/,'').trim();const m=base.match(/^([A-Za-z]+\d+)/);const key=(m?m[1]:base).toUpperCase();let t=trees.find(x=>String(x.label||'').toUpperCase()===key);if(!t)t=trees.find(x=>String(x.epc||'').toUpperCase()===base.toUpperCase());return t||null;}
function bindPhotosImport(){const fi=el('p_files');if(!fi)return;const pd=el('p_date');if(pd)pd.onchange=()=>{S.photoDate=pd.value;};fi.onchange=e=>{pendingPhotos=[...e.target.files];previewPhotos();};}
function previewPhotos(){
  const box=el('bulkres');if(!box)return;
  const f=S.fields.find(x=>x.id===S.entryField);const trees=S.trees.filter(t=>t.field_id===f.id);
  const rows=pendingPhotos.map(fl=>({fl,t:matchTree(fl.name,trees)}));
  const ok=rows.filter(r=>r.t).length,ng=rows.length-ok;
  const list=rows.map(r=>`<tr><td>${esc(r.fl.name)}</td><td>${r.t?esc(r.t.label||r.t.epc||''):'<span style="color:var(--danger)">未対応</span>'}</td></tr>`).join('');
  box.innerHTML=`<p class="lead"><b>${rows.length}</b>件選択 ・ 振り分け成功 <b>${ok}</b> ・ 未対応 <b>${ng}</b></p>
    <div style="overflow:auto;max-height:44vh"><table><thead><tr><th>ファイル名</th><th>振り分け先（記号）</th></tr></thead><tbody>${list}</tbody></table></div>
    <button class="act" id="p_run" style="margin-top:10px" ${ok?'':'disabled'}>${ok}件を取り込む</button>
    <div id="p_msg" class="lead" style="margin-top:6px"></div>`;
  const run=el('p_run');if(run)run.onclick=()=>runPhotosImport(rows.filter(r=>r.t));
}
async function runPhotosImport(rows){
  const date=(el('p_date')&&el('p_date').value)?el('p_date').value:null;
  const msg=el('p_msg');let done=0,skip=0;
  const tids=[...new Set(rows.map(r=>r.t.id))];const existing=new Set();
  for(let i=0;i<tids.length;i+=150){const {data}=await sb.from('tree_photos').select('tree_id,caption').in('tree_id',tids.slice(i,i+150));(data||[]).forEach(p=>existing.add(p.tree_id+'::'+(p.caption||'')));}
  for(const r of rows){
    if(existing.has(r.t.id+'::'+r.fl.name)){skip++;continue;}
    const path=`${r.t.id}/${Date.now()}-${r.fl.name.replace(/[^\w.\-]/g,'_')}`;
    const up=await sb.storage.from('tree-photos').upload(path,r.fl);
    if(up.error){if(msg)msg.innerHTML=`<span class="bad">${esc(r.fl.name)}: ${esc(up.error.message)}</span>`;continue;}
    const taken=await photoTakenDate(r.fl,date);const {error}=await sb.from('tree_photos').insert({tree_id:r.t.id,taken_on:taken,storage_path:path,caption:r.fl.name,created_by:S.session.user.id});
    if(error){if(msg)msg.innerHTML=`<span class="bad">記録失敗 ${esc(r.fl.name)}: ${esc(error.message)}</span>`;continue;}
    done++;if(msg)msg.textContent=`取込中… ${done}/${rows.length}`;
  }
  if(msg)msg.innerHTML=`<span class="ok">完了：${done}件を取り込みました${skip?`（既存${skip}件はスキップ）`:''}。圃場マップで個体をクリックすると表示されます。</span>`;
}

/* ===== ダッシュボード ===== */
function viewDash(){
  const site=S.sites.find(s=>s.id===S.site);let totT=0,totC=0;
  const pf=S.fields.map(f=>{const ts=S.trees.filter(t=>t.field_id===f.id);let c2=0;ts.forEach(t=>{const m=measFor(t.id,'latest');const c=m?co2(m):null;if(c)c2+=c.kg;});totT+=ts.length;totC+=c2;return{f,n:ts.length,c2};});
  const rfid=pf.filter(x=>x.f.rfid_managed),lay=pf.filter(x=>!x.f.rfid_managed);
  const rsum=rfid.reduce((a,x)=>a+x.n,0),lsum=lay.reduce((a,x)=>a+x.n,0);
  return `<div class="stats"><div class="stat"><div class="k">登録本数</div><div class="v">${totT}</div></div><div class="stat"><div class="k">推定CO₂合計</div><div class="v">${fmt(totC,0)}<small>kg</small></div></div><div class="stat"><div class="k">RFID管理済</div><div class="v">${rsum}<small>本</small></div></div></div>
   <div class="card"><h2>区分別 本数（提出用）</h2><table><tbody>${rfid.map(x=>`<tr><td>${esc(x.f.name)} RFID管理本数</td><td>${x.n}</td></tr>`).join('')}<tr style="background:rgba(111,143,78,.10)"><td style="font-weight:800">RFID管理済合計</td><td class="co2" style="font-weight:800">${rsum}</td></tr>${lay.map(x=>`<tr><td>${esc(x.f.name)} 配置データ</td><td>${x.n}</td></tr>`).join('')}<tr style="background:rgba(192,138,45,.12)"><td style="font-weight:800">配置データ含む総数</td><td style="font-weight:800">${rsum+lsum}</td></tr></tbody></table></div>
   <div class="card"><h2>圃場別</h2><table><thead><tr><th>圃場</th><th>MRV扱い</th><th>RFID</th><th>本数</th><th>CO₂kg</th></tr></thead><tbody>${pf.map(x=>`<tr><td>${esc(x.f.name)}</td><td style="text-align:left">${esc(x.f.mrv_status||'-')}</td><td>${x.f.rfid_managed?'○':'—'}</td><td>${x.n}</td><td class="co2">${fmt(x.c2,1)}</td></tr>`).join('')||'<tr><td colspan="5">なし</td></tr>'}</tbody></table></div>`;
}

/* ===== イベント ===== */
function bind(){
  if(el('jpmap'))initJpMap();
  if(el('p_files'))bindPhotosImport();
  document.querySelectorAll('[data-seg]').forEach(g=>{const id=g.dataset.seg;g.querySelectorAll('button').forEach(b=>b.onclick=()=>{const v=b.dataset.v;if(id==='field'){S.field=v;closeDrawer();}else if(id==='metric')S.metric=v;else if(id==='round')S.round=v;else if(id==='efield')S.entryField=v;else if(id==='pfield')S.entryField=v;else if(id==='view')S.compare=(v==='compare');render();});});
  document.querySelectorAll('.maparea svg circle[data-id]').forEach(c=>c.onclick=()=>openDrawer(c.getAttribute('data-id')));
  const sm=el('saveMeta');if(sm)sm.onclick=async()=>{const {error}=await sb.from('fields').update({shozai:el('m_shozai').value,mrv_status:el('m_mrv').value,rfid_managed:el('m_rfid').checked}).eq('id',S.field);if(error){alert(error.message);return;}await loadSite(S.site);render();};
  document.querySelectorAll('[data-pid]').forEach(inp=>inp.onchange=async()=>{const id=inp.dataset.pid,k=inp.dataset.k;let v=inp.value;if(k==='area_sqm')v=v===''?null:+v;const {error}=await sb.from('parcels').update({[k]:v}).eq('id',id);if(error){alert(error.message);return;}await loadSite(S.site);render();});
  document.querySelectorAll('[data-delp]').forEach(b=>b.onclick=async()=>{if(!confirm('削除しますか？'))return;await sb.from('parcels').delete().eq('id',b.dataset.delp);await loadSite(S.site);render();});
  const ap=el('addParcel');if(ap)ap.onclick=async()=>{const chiban=el('np_chiban').value.trim();if(!chiban){alert('地番を入れてください');return;}const {error}=await sb.from('parcels').insert({field_id:S.field,chiban,chimoku:el('np_chimoku').value,area_sqm:el('np_area').value===''?null:+el('np_area').value,owner:el('np_owner').value});if(error){alert(error.message);return;}await loadSite(S.site);render();};
  const ed=el('e_date');if(ed)ed.onchange=()=>{S.entryDate=ed.value;};
  document.querySelectorAll('[data-tid][data-k]').forEach(inp=>inp.oninput=()=>{const t=inp.dataset.tid;const c=co2({height_m:val('h',t),dbh_cm:val('dbh',t),root_d_cm:val('rd',t)});const cell=el('c_'+t);if(cell)cell.textContent=c?(fmt(c.kg,2)+(c.est?'*':'')):'–';});
  const sa=el('saveAll');if(sa)sa.onclick=saveAll;
  const co=el('csvOut');if(co)co.onclick=csvOut;
  const ci=el('csvIn');if(ci)ci.onchange=csvIn;
}
async function saveAll(){const f=S.fields.find(x=>x.id===S.entryField);if(!f)return;const date=el('e_date').value;const trees=S.trees.filter(t=>t.field_id===f.id);const rows=[];trees.forEach(t=>{const h=val('h',t.id),dbh=val('dbh',t.id),rd=val('rd',t.id);if(h===''&&dbh===''&&rd==='')return;const c=co2({height_m:h,dbh_cm:dbh,root_d_cm:rd});rows.push({tree_id:t.id,measured_on:date,height_m:h===''?null:+h,dbh_cm:dbh===''?null:+dbh,root_d_cm:rd===''?null:+rd,co2_kg:c?c.kg:null,estimated:c?c.est:false,created_by:S.session.user.id});});if(!rows.length){el('emsg').innerHTML='<span class="lead">入力された行がありません。</span>';return;}el('emsg').innerHTML='<span class="lead">保存中…</span>';const tids=rows.map(r=>r.tree_id);for(let i=0;i<tids.length;i+=150){await sb.from('measurements').delete().eq('measured_on',date).in('tree_id',tids.slice(i,i+150));}for(let i=0;i<rows.length;i+=200){const {error}=await sb.from('measurements').insert(rows.slice(i,i+200));if(error){el('emsg').innerHTML=`<span class="bad">${esc(error.message)}</span>`;return;}}await loadSite(S.site);render();setTimeout(()=>{const m=el('emsg');if(m)m.innerHTML=`<span class="ok">${rows.length}本分を保存しました（${date}）。</span>`;},50);}
function csvOut(){const f=S.fields.find(x=>x.id===S.entryField);if(!f)return;const trees=S.trees.filter(t=>t.field_id===f.id);const lines=['記号,樹高m,DBHcm,根元cm'].concat(trees.map(t=>`${t.label||t.epc||''},,,`));const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${f.name}_計測雛形.csv`;a.click();}
function csvIn(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{const txt=String(r.result).replace(/^\ufeff/,'');const lines=txt.split(/\r?\n/).filter(x=>x.trim());const head=lines.shift();const idx={};head.split(',').forEach((h,i)=>idx[h.trim()]=i);const f=S.fields.find(x=>x.id===S.entryField);const byLabel={};S.trees.filter(t=>t.field_id===f.id).forEach(t=>byLabel[(t.label||'').trim()]=t.id);let n=0;lines.forEach(ln=>{const c=ln.split(',');const label=(c[idx['記号']]||'').trim();const tid=byLabel[label];if(!tid)return;const set=(k,col)=>{const e2=document.querySelector(`[data-tid="${tid}"][data-k="${k}"]`);if(e2&&col!=null&&c[col]!=null&&c[col].trim()!=='')e2.value=c[col].trim();};set('h',idx['樹高m']);set('dbh',idx['DBHcm']);set('rd',idx['根元cm']);const cc=co2({height_m:val('h',tid),dbh_cm:val('dbh',tid),root_d_cm:val('rd',tid)});const cell=el('c_'+tid);if(cell)cell.textContent=cc?fmt(cc.kg,2):'–';n++;});el('emsg').innerHTML=`<span class="ok">${n}行を表に取り込みました。確認して「すべて保存」を押してください。</span>`;};r.readAsText(file);}
</script>
