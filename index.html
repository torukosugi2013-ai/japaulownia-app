<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ジャパロニア 圃場ビューア（クラウド版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1e8;--paper:#fbfaf4;--ink:#23291f;--muted:#6f7560;--line:#dcd7c4;--forest:#2f4a32;--forest2:#3e6043;--leaf:#6f8f4e;--gold:#c08a2d;--danger:#a8402f;--shadow:0 1px 2px rgba(35,41,31,.06),0 10px 30px rgba(35,41,31,.08)}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:"Zen Kaku Gothic New",system-ui,sans-serif;color:var(--ink);min-height:100vh;background:radial-gradient(1200px 500px at 88% -12%,rgba(111,143,78,.12),transparent 60%),radial-gradient(900px 420px at -10% 110%,rgba(154,107,59,.08),transparent 60%),var(--bg);-webkit-font-smoothing:antialiased}
.mincho{font-family:"Shippori Mincho",serif}.mono{font-family:"JetBrains Mono",monospace}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px 60px}
header{padding:26px 0 14px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px}
.logo{width:44px;height:44px;border-radius:13px;background:linear-gradient(150deg,var(--forest),var(--forest2));display:grid;place-items:center;box-shadow:var(--shadow)}
.logo svg{width:27px;height:27px}
.brand h1{font-size:21px;margin:0;font-weight:800;color:var(--forest);letter-spacing:.03em}
.brand .sub{font-size:11px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:2px}
.sitebar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.sitebtn{display:flex;flex-direction:column;gap:2px;border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:11px 18px;cursor:pointer;box-shadow:var(--shadow);transition:.16s;min-width:150px}
.sitebtn:hover{border-color:var(--leaf)}
.sitebtn.on{background:var(--forest);border-color:var(--forest)}
.sitebtn.on .nm,.sitebtn.on .mt{color:#fff}
.sitebtn .nm{font-family:"Shippori Mincho",serif;font-weight:700;font-size:15px;color:var(--forest)}
.sitebtn .mt{font-size:11px;color:var(--muted)}
.tabs{display:flex;gap:4px;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:5px;box-shadow:var(--shadow);flex-wrap:wrap;margin-bottom:14px}
.tabs button{font-family:inherit;border:0;background:transparent;color:var(--muted);padding:8px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;transition:.16s}
.tabs button:hover{color:var(--ink)}
.tabs button.on{background:var(--forest2);color:#fff}
.controls{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.ctl{display:flex;flex-direction:column;gap:6px}
.ctl .lab{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;box-shadow:var(--shadow);flex-wrap:wrap}
.seg button{border:0;background:transparent;font-family:inherit;font-weight:700;font-size:12.5px;padding:8px 13px;cursor:pointer;color:var(--muted);transition:.15s}
.seg button.on{background:var(--forest);color:#fff}.seg button:disabled{opacity:.3;cursor:not-allowed}
.regchip{font-size:12px;font-weight:700;color:var(--gold);background:rgba(192,138,45,.12);border:1px solid rgba(192,138,45,.4);border-radius:10px;padding:9px 14px}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:11px 16px;box-shadow:var(--shadow);min-width:118px}
.stat .k{font-size:10.5px;color:var(--muted);font-weight:700}
.stat .v{font-size:21px;font-weight:800;color:var(--forest);font-family:"Shippori Mincho",serif;line-height:1.1;margin-top:3px}
.stat .v small{font-size:11px;color:var(--muted);font-weight:500;margin-left:3px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:20px;margin-bottom:14px}
.card h2{font-family:"Shippori Mincho",serif;font-size:16px;margin:0 0 3px;color:var(--forest)}
.card .lead{font-size:12px;color:var(--muted);margin:0 0 14px}
.maparea{background:repeating-linear-gradient(0deg,#fcfbf5,#fcfbf5 1px,transparent 1px,transparent 26px),repeating-linear-gradient(90deg,#fcfbf5,#fcfbf5 1px,transparent 1px,transparent 26px),#fdfcf6;border:1px solid var(--line);border-radius:14px;padding:10px}
svg circle{cursor:pointer;transition:transform .12s;transform-box:fill-box;transform-origin:center}
svg circle:hover{transform:scale(1.55)}
svg circle.dotsel{stroke:var(--gold);stroke-width:3}
.legend{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-top:12px;flex-wrap:wrap}
.legendbar{height:10px;width:150px;border-radius:6px;background:linear-gradient(90deg,#e9efd8,#2f4a32)}
.sw{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:4px;vertical-align:-1px}
.drawer{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;background:var(--paper);border-left:1px solid var(--line);box-shadow:-12px 0 40px rgba(35,41,31,.16);transform:translateX(105%);transition:transform .32s cubic-bezier(.4,0,.2,1);z-index:40;overflow-y:auto;padding:24px}
.drawer.open{transform:none}
.drawer .x{position:absolute;top:16px;right:16px;border:1px solid var(--line);background:#fff;border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:18px;color:var(--muted)}
.dtag{font-family:"Shippori Mincho",serif;font-size:22px;font-weight:800;color:var(--forest)}
.dpos{font-size:12px;color:var(--muted);margin-top:2px}
.depc{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--muted);word-break:break-all;margin-top:6px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 9px}
.sub{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin:20px 0 9px;border-bottom:1px solid var(--line);padding-bottom:6px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:right;font-size:10px;color:var(--muted);font-weight:700;padding:7px 6px;border-bottom:2px solid var(--line)}th:first-child{text-align:left}
td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;font-family:"JetBrains Mono",monospace;font-size:12px}
td:first-child{text-align:left;font-family:inherit;font-weight:700}tr:last-child td{border-bottom:0}
.co2{color:var(--forest);font-weight:700}
.spark{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px}
input{font-family:inherit;font-size:13px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 10px;width:100%}
input:focus{outline:0;border-color:var(--leaf);box-shadow:0 0 0 3px rgba(111,143,78,.18)}
select{font-family:inherit;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 10px}
button.act{font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer;border:0;border-radius:9px;padding:9px 14px;background:var(--forest);color:#fff;white-space:nowrap}
button.act:hover{background:var(--forest2)}
button.act.gh{background:#fff;color:var(--forest);border:1px solid var(--forest)}
button.act.sm{padding:6px 10px;font-size:11.5px}
.del{background:#fff;color:var(--danger);border:1px solid #e3b7b7;border-radius:8px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer}
.scrim{position:fixed;inset:0;background:rgba(35,41,31,.28);opacity:0;pointer-events:none;transition:.3s;z-index:35}.scrim.on{opacity:1;pointer-events:auto}
.banner{background:linear-gradient(120deg,rgba(192,138,45,.10),rgba(111,143,78,.08));border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:12px;padding:12px 15px;font-size:12px;color:#5a5234;line-height:1.6}
.center{min-height:90vh;display:flex;align-items:center;justify-content:center;padding:18px}
.auth{width:380px;max-width:94vw}
footer{text-align:center;color:var(--muted);font-size:11px;margin-top:24px;padding-top:18px;border-top:1px solid var(--line);line-height:1.7}
.ok{color:var(--forest2);font-size:12px}.bad{color:var(--danger);font-size:12px}
.gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.phitem{display:flex;flex-direction:column;gap:4px}
.ph{position:relative;border:1px solid var(--line);border-radius:10px;overflow:hidden;aspect-ratio:4/3;background:#f7f5ee}
.ph .phdel{position:absolute;top:5px;right:5px;width:26px;height:26px;border-radius:50%;border:0;background:rgba(20,24,18,.72);color:#fff;font-size:16px;line-height:26px;cursor:pointer;z-index:5;padding:0}
.phbroken{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f3f1e9;color:var(--danger);font-size:11px;text-align:center;padding:6px;pointer-events:none;z-index:1}
.ph img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;display:block}
.phcap{text-align:center;font-size:12px;color:var(--ink);font-family:"JetBrains Mono",monospace}
.phcap .capdate{cursor:pointer;border-bottom:1px dotted var(--muted)}
.emptyph{grid-column:1/-1;text-align:center;color:var(--muted);font-size:12px;padding:18px;border:1px dashed var(--line);border-radius:10px;background:#fffdf6}
.lightbox{position:fixed;inset:0;background:rgba(20,24,18,.86);display:none;align-items:center;justify-content:center;z-index:60;cursor:zoom-out;padding:30px}
.lightbox.on{display:flex;flex-direction:column;gap:10px}.lightbox img{max-width:94vw;max-height:84vh;border-radius:10px}.lightbox .lbcap{color:#fff;font-family:"JetBrains Mono",monospace;font-size:13px;background:rgba(0,0,0,.45);padding:5px 12px;border-radius:8px}
/* ===== 統合ダッシュボード（.dashx でスコープ） ===== */
.dashx{--dfor:#1f3d2b;--dfor2:#2e573c;--dmoss:#6b8e5a;--dsand:#d9d2c0;--dline:#e4dfd2;--dpaper:#fbfaf6;--dbg:#f4f1ea;--dink:#1c2620;--dsoft:#5a6259;--dok:#3a7d52;--dwarn:#c8742d;}
.dashx .dhead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:2px 0 6px}
.dashx .dhead h2{font-family:"Shippori Mincho",serif;font-size:20px;font-weight:700}
.dashx .dhead .en{color:var(--dmoss);font-size:12px;letter-spacing:.08em}
.dashx .dsub{color:var(--dsoft);font-size:12px;margin-bottom:16px}
.dashx .dsub b{color:var(--dfor2)}
.dashx .upd{margin-left:auto;font-family:inherit;border:1px solid var(--dline);background:var(--dpaper);color:var(--dsoft);border-radius:9px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
.dashx .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.dashx .kpi{background:var(--dpaper);border:1px solid var(--dline);border-radius:14px;padding:15px 17px;position:relative;overflow:hidden}
.dashx .kpi::after{content:"";position:absolute;right:-20px;top:-20px;width:62px;height:62px;border-radius:50%;background:var(--dsand);opacity:.4}
.dashx .kpi .lab{font-size:11px;color:var(--dsoft);letter-spacing:.04em;margin-bottom:5px;position:relative}
.dashx .kpi .val{font-family:"Shippori Mincho",serif;font-size:26px;font-weight:700;color:var(--dfor);position:relative}
.dashx .kpi .val small{font-size:13px;font-weight:500;color:var(--dsoft);margin-left:3px}
.dashx .kpi .sub2{font-size:11px;color:var(--dmoss);margin-top:2px;position:relative}
.dashx .dpanel{background:var(--dpaper);border:1px solid var(--dline);border-radius:16px;margin-bottom:18px;overflow:hidden}
.dashx .dpanel-h{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--dline)}
.dashx .dpanel-h h3{font-family:"Shippori Mincho",serif;font-size:15px;font-weight:600}
.dashx .dpanel-h .count{font-size:11px;color:var(--dsoft);background:var(--dbg);padding:2px 9px;border-radius:20px}
.dashx .dpanel-b{padding:16px 18px}
.dashx .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
@media(max-width:880px){.dashx .two-col{grid-template-columns:1fr}}
.dashx table{width:100%;border-collapse:collapse;font-size:13px}
.dashx th{text-align:left;font-size:11px;letter-spacing:.03em;color:var(--dsoft);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--dline);background:var(--dbg)}
.dashx td{padding:10px 12px;border-bottom:1px solid var(--dline)}
.dashx tr:last-child td{border-bottom:none}
.dashx .num{text-align:right;font-variant-numeric:tabular-nums}
.dashx .dmuted{color:var(--dsoft)}
.dashx .dbar{height:9px;border-radius:5px;background:var(--dline);overflow:hidden;display:flex;min-width:80px}
.dashx .dbar i{display:block;height:100%}
.dashx .spill{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:#eef0e6;color:#5c6a3c}
.dashx .dlegend{display:flex;gap:14px;font-size:11px;color:var(--dsoft);margin-bottom:10px;flex-wrap:wrap}
.dashx .dlegend i{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px}
.dashx .sec-row{display:grid;grid-template-columns:140px 1fr 92px;gap:10px;align-items:center;padding:6px 0;border-bottom:1px dotted var(--dline)}
.dashx .sec-row:last-child{border-bottom:none}
.dashx .sec-row .nm{font-size:13px}
.dashx .sec-row .pc{font-size:12px;color:var(--dsoft);text-align:right;font-variant-numeric:tabular-nums}
.dashx .dnote{font-size:11.5px;color:var(--dsoft);margin-top:8px}
.dashx .fb-site{font-size:11px;font-weight:700;color:#5c6a3c;letter-spacing:.03em;margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--dline)}
.dashx .fb-site:first-child{margin-top:0}
.dashx .fb-row{display:grid;grid-template-columns:88px 1fr 104px;gap:10px;align-items:center;padding:5px 0}
.dashx .fb-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dashx .fb-track{height:15px;background:#f0eee7;border-radius:8px;overflow:hidden;display:flex}
.dashx .fb-track i{display:block;height:100%}
.dashx .fb-val{text-align:right;font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}
.dashx .fb-val b{font-family:"Shippori Mincho",serif;font-size:15px;color:var(--dfor)}
.dashx .fb-val small{color:var(--dsoft);font-size:11px}
.dashx .fb-empty{font-size:11px;color:var(--dsoft)}
/* ===== 圃場スケジュール カレンダー ===== */
.calwrap{margin-top:4px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.caldow{text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding:2px 0}
.caldow.sun{color:#c0392b}.caldow.sat{color:#2f6fb0}
.calcell{min-height:66px;border:1px solid var(--line);border-radius:8px;padding:3px 4px;background:var(--paper);overflow:hidden}
.calcell.calempty{border:0;background:transparent}
.calcell.caltoday{border-color:var(--forest2);box-shadow:0 0 0 1px var(--forest2) inset}
.caldnum{font-size:11px;color:var(--muted);font-weight:700;line-height:1}
.calchip{font-size:10px;border-radius:4px;padding:1px 4px;margin-top:2px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;cursor:default}
@media(max-width:720px){.calcell{min-height:54px}.calchip{font-size:9px}}
.leaflet-tooltip.jp-tip{background:#fff;border:1px solid #2f4a32;border-radius:9px;font-size:11px;line-height:1.4;padding:4px 8px;box-shadow:0 2px 6px rgba(0,0,0,.28);color:#1f2a1f;font-weight:500}
.leaflet-tooltip.jp-tip b{color:#2f4a32}
</style>
</head>
<body>
<div id="root"><div class="center"><div class="mono" style="color:var(--muted)">読み込み中…</div></div></div>

<script type="module">
let L=null;
async function ensureL(){if(L&&L.map)return L;for(const u of ['https://esm.sh/leaflet@1.9.4','https://cdn.jsdelivr.net/npm/leaflet@1.9.4/+esm']){try{const m=await import(u);const cand=m.default||m.L||m;if(cand&&cand.map){L=cand;return L;}}catch(_){}}L=null;return null;}
async function loadCreateClient(){for(const u of ['https://esm.sh/@supabase/supabase-js@2','https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm']){try{const m=await import(u);if(m.createClient)return m.createClient;}catch(_){}}return null;}
const SUPABASE_URL='https://bieamtjesoaimlmrtmfj.supabase.co';   // デプロイ時はここに直書きしてもよい
const SUPABASE_ANON='sb_publishable_-paeLD0LA0CMmMmDKhXVEg_YN_Y0OGx';
const LEAF='<svg viewBox="0 0 24 24" fill="none"><path d="M12 21v-6" stroke="#cfe0b8" stroke-width="1.8" stroke-linecap="round"/><path d="M12 15c-3.6 0-5.2-2.2-5.2-4.6C6.8 8.4 8 7.6 8 6c1.4.6 2 1.8 2 1.8S10.4 3 12 2c1.6 1 2 5.8 2 5.8s.6-1.2 2-1.8c0 1.6 1.2 2.4 1.2 4.4C17.2 12.8 15.6 15 12 15Z" fill="#9fc06f"/></svg>';

const P={cfL:0.452,cfB:0.417,cfS:0.474,cfR:0.456};
function co2(m){if(!m)return null;let dbh=(m.dbh_cm!=null&&m.dbh_cm!=='')?+m.dbh_cm:null;let d0=(m.root_d_cm!=null&&m.root_d_cm!=='')?+m.root_d_cm:null;let est=false;if(dbh==null&&d0!=null){dbh=(d0-1.6721)/1.2663;est=true;}if(dbh==null)return null;if(d0==null)d0=1.2663*dbh+1.6721;let h=(m.height_m!=null&&m.height_m!=='')?(+m.height_m*100):null;if(h==null){h=41.306*d0+53.998;est=true;}const dd=(dbh!=null&&dbh>0)?dbh:d0;const X=dd*dd*h;const WL=.001*X**.7197,WB=.0005*X**.7375,WS=.0007*X**.8221,WR=.0011*(d0*d0)**1.602;return{kg:(WL*P.cfL+WB*P.cfB+WS*P.cfS+WR*P.cfR)*(44/12),est};}
const fmt=(n,d=1)=>(n==null||isNaN(n))?'–':Number(n).toLocaleString('ja-JP',{maximumFractionDigits:d});
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const el=id=>document.getElementById(id);
const root=el('root');
function heat(t){const a=[233,239,216],b=[47,74,50];const c=a.map((x,i)=>Math.round(x+(b[i]-x)*Math.max(0,Math.min(1,t))));return`rgb(${c[0]},${c[1]},${c[2]})`;}

let sb=null;
let pendingPhotos=[];
let S={session:null,sites:[],site:null,fields:[],trees:[],meas:[],tab:'jp',field:null,metric:'co2',viz:'height',round:'latest',compare:false,photoDate:null,selTree:null,sops:[],worklogs:[],staff:[],workMonth:null,entryField:null,entryDate:new Date().toISOString().slice(0,10),projects:[],pfields:[],stages:[],issuances:[],txns:[],reqs:[],parties:[],activities:[],creditProj:null};

init();
function getCfg(k,c){return (c&&!c.includes('ここに')&&c.trim())?c:(localStorage.getItem(k)||'');}
async function init(){const url=getCfg('jp_sb_url',SUPABASE_URL),key=getCfg('jp_sb_key',SUPABASE_ANON);if(!url||!key){renderSetup();return;}const createClient=await loadCreateClient();if(!createClient){root.innerHTML=frame('<p class="lead" style="font-size:13px;color:var(--muted)">接続ライブラリの読み込みに失敗しました。通信環境（オフライン／社内ネットの制限など）をご確認のうえ、再読み込みしてください。</p><button class="act" style="margin-top:12px;width:100%" onclick="location.reload()">再読み込み</button>');return;}sb=createClient(url,key,{auth:{storage:window.sessionStorage,persistSession:true,autoRefreshToken:true}});const {data}=await sb.auth.getSession();S.session=data.session;sb.auth.onAuthStateChange((_e,s)=>{S.session=s;s?afterLogin():render();});S.session?afterLogin():render();}
function frame(inner){return `<div class="center"><div class="card auth"><div class="brand" style="margin-bottom:14px"><div class="logo">${LEAF}</div><div><h1 class="mincho" style="font-size:18px;color:var(--forest);margin:0">ジャパロニア</h1><div class="sub">植林CO₂管理 クラウド</div></div></div>${inner}</div></div>`;}
function renderSetup(){root.innerHTML=frame(`<h2 class="mincho" style="color:var(--forest)">初回設定</h2><p class="lead" style="font-size:12px;color:var(--muted)">SupabaseのURLとキー（anon/publishable）を貼ってください。この端末に記憶され次回以降は不要です。</p><label class="sub" style="border:0;margin:8px 0 4px">Project URL</label><input id="c_url" placeholder="https://xxxx.supabase.co"><label class="sub" style="border:0;margin:10px 0 4px">anon / publishable キー</label><input id="c_key" placeholder="eyJ... / sb_publishable_..."><button class="act" id="c_save" style="margin-top:12px;width:100%">保存して始める</button>`);el('c_save').onclick=()=>{const u=el('c_url').value.trim(),k=el('c_key').value.trim();if(!u||!k){alert('両方入れてください');return;}localStorage.setItem('jp_sb_url',u);localStorage.setItem('jp_sb_key',k);location.reload();};}
async function afterLogin(){await loadSites();await loadStaff();render();}
async function loadStaff(){S.staff=((await sb.from('staff').select('*').order('name')).data)||[];}
async function loadSites(){const {data,error}=await sb.from('sites').select('*').order('name');if(error){alert('読込エラー: '+error.message);return;}S.sites=data||[];if(!S.site&&S.sites.length)S.site=S.sites[0].id;if(S.site)await loadSite(S.site);}
async function loadSite(id){S.site=id;const {data:fields}=await sb.from('fields').select('*, parcels(*)').eq('site_id',id).order('name');S.fields=fields||[];if((!S.field||!S.fields.find(f=>f.id===S.field))&&S.fields.length)S.field=S.fields[0].id;if((!S.entryField||!S.fields.find(f=>f.id===S.entryField))&&S.fields.length)S.entryField=S.fields[0].id;const fids=S.fields.map(f=>f.id);S.trees=[];if(fids.length){let _tf=0;for(;;){const _r=await sb.from('trees').select('*').in('field_id',fids).range(_tf,_tf+999);const _d=_r.data||[];S.trees=S.trees.concat(_d);if(_d.length<1000)break;_tf+=1000;}}const tids=S.trees.map(t=>t.id);S.meas=[];for(let i=0;i<tids.length;i+=150){const r=await sb.from('measurements').select('*').in('tree_id',tids.slice(i,i+150)).order('measured_on');if(r.data)S.meas=S.meas.concat(r.data);}const seen={},dd=[];const sc=x=>(x.co2_kg!=null?2:0)+(x.height_m!=null?1:0)+(x.dbh_cm!=null?1:0)+(x.root_d_cm!=null?1:0);S.meas.forEach(m=>{const k=m.tree_id+'|'+m.measured_on;if(!(k in seen)){seen[k]=dd.length;dd.push(m);}else if(sc(m)>sc(dd[seen[k]])){dd[seen[k]]=m;}});S.meas=dd.sort((a,b)=>String(a.measured_on).localeCompare(String(b.measured_on)));S.worklogs=fids.length?((await sb.from('work_logs').select('*').in('field_id',fids).order('work_date',{ascending:false})).data||[]):[];if(!S.sops.length){S.sops=((await sb.from('sops').select('*').order('sort_order')).data)||[];}await loadCredit(id);}
async function loadCredit(id){
  const pj=((await sb.from('cc_projects').select('*').eq('site_id',id).order('created_at')).data)||[];
  S.projects=pj;const pids=pj.map(p=>p.id);
  S.pfields=pids.length?(((await sb.from('cc_project_fields').select('*').in('project_id',pids)).data)||[]):[];
  S.stages=pids.length?(((await sb.from('cc_stages').select('*').in('project_id',pids).order('sort_order')).data)||[]):[];
  S.issuances=pids.length?(((await sb.from('cc_issuances').select('*').in('project_id',pids).order('issue_date')).data)||[]):[];
  const iids=S.issuances.map(i=>i.id);
  S.txns=iids.length?(((await sb.from('cc_transactions').select('*').in('issuance_id',iids).order('txn_date')).data)||[]):[];
  S.reqs=pids.length?(((await sb.from('cc_requirements').select('*').in('project_id',pids).order('sort_order')).data)||[]):[];
  S.parties=pids.length?(((await sb.from('cc_parties').select('*').in('project_id',pids).order('sort_order')).data)||[]):[];
  S.activities=pids.length?(((await sb.from('cc_activities').select('*').in('project_id',pids).order('act_date',{ascending:false})).data)||[]):[];
  if((!S.creditProj||!pj.find(p=>p.id===S.creditProj))&&pj.length)S.creditProj=pj[0].id;
}

function treeMeas(tid){return S.meas.filter(m=>m.tree_id===tid);}
function measFor(tid,round){const ms=treeMeas(tid);if(!ms.length)return null;if(round==='latest')return ms[ms.length-1];return ms.find(m=>m.measured_on===round)||null;}
function metricVal(tid,round,metric){const m=measFor(tid,round);if(!m)return null;if(metric==='co2'){const c=co2(m);return c?c.kg:(m.co2_kg??null);}if(metric==='h')return m.height_m;if(metric==='dbh')return m.dbh_cm;return null;}
function fieldRounds(f){const tids=S.trees.filter(t=>t.field_id===f.id).map(t=>t.id);const set=new Set();S.meas.forEach(m=>{if(tids.includes(m.tree_id))set.add(m.measured_on);});return[...set].sort();}
const val=(k,tid)=>{const e=document.querySelector(`[data-tid="${tid}"][data-k="${k}"]`);return e?e.value:'';};
function seg(id,opts,cur){return `<div class="seg" data-seg="${id}">`+opts.map(([v,l])=>`<button class="${v===cur?'on':''}" data-v="${esc(v)}">${esc(l)}</button>`).join('')+`</div>`;}

  const siteSelOpts=S.sites.map(s=>`<option value="${esc(s.id)}" ${s.id===S.site?'selected':''}>${esc(s.name)}（${S.site===s.id?S.fields.length:'…'}圃場）</option>`).join('');

      <div style="display:flex;align-items:center;gap:10px"><span class="mono" style="font-size:11px;color:var(--muted)">${esc(S.session.user.email||'')}</span><button class="act gh sm" id="logout">ログアウト</button></div></header>
    <div style="background:#1f6f43;color:#fff;text-align:center;font-weight:700;font-size:13px;padding:6px;border-radius:8px;margin:6px 0;letter-spacing:.04em">最新版 0621-cc5 を表示中 ✅</div>
    ${S.tab==='jp'?'':`<div class="sitebar" style="align-items:center;gap:10px"><span style="font-size:13px;color:var(--muted)">拠点</span><select id="siteSelect" style="font-size:14px;padding:8px 12px;border:1px solid var(--line);border-radius:10px;min-width:240px;background:var(--paper)">${siteSelOpts||'<option>拠点なし</option>'}</select><span style="font-size:12px;color:var(--muted)">圃場は地区マップ上でクリックして選択</span></div>`}
    <div class="tabs"><button class="${S.tab==='jp'?'on':''}" data-tab="jp">全国マップ・概況</button><button class="${S.tab==='district'?'on':''}" data-tab="district">地区マップ</button><button class="${S.tab==='map'?'on':''}" data-tab="map">圃場マップ</button><button class="${S.tab==='entry'?'on':''}" data-tab="entry">計測入力</button><button class="${S.tab==='cam'?'on':''}" data-tab="cam">カメラ計測</button><button class="${S.tab==='photos'?'on':''}" data-tab="photos">写真取込</button><button class="${S.tab==='work'?'on':''}" data-tab="work">作業・費用</button><button class="${S.tab==='credit'?'on':''}" data-tab="credit">カーボンクレジット</button></div>
    ${content}
    <footer>ジャパロニア 植林CO₂管理 ・ 算定：中根(2008) 相対成長式 ・ データはSupabaseに保存 ・ <span class="mono" style="color:var(--gold)">版 0621-cc5（クレジット：関係者・契約台帳と実施記録、書類の版・提出日を追加）</span></footer>
  </div>
  <div class="scrim" id="scrim"></div><div class="drawer" id="drawer"></div><div class="lightbox" id="lb"><img><div class="lbcap" id="lbcap"></div></div>`;
  el('logout').onclick=async()=>{await sb.auth.signOut();S.site=null;S.field=null;};
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;render();});
  document.querySelectorAll('[data-site]').forEach(b=>b.onclick=async()=>{S.site=b.dataset.site;S.field=null;S.entryField=null;await loadSite(S.site);render();});
  const ssel=el('siteSelect');if(ssel)ssel.onchange=async()=>{S.site=ssel.value;S.field=null;S.entryField=null;await loadSite(S.site);render();};
  const sc=el('scrim');if(sc)sc.onclick=closeDrawer;const lb=el('lb');if(lb)lb.onclick=()=>lb.classList.remove('on');
  bind();

function renderLogin(){root.innerHTML=frame(`<h2 class="mincho" style="color:var(--forest)">ログイン</h2><label class="sub" style="border:0;margin:8px 0 4px">メールアドレス</label><input id="email" type="email"><label class="sub" style="border:0;margin:10px 0 4px">パスワード</label><input id="pw" type="password"><div style="margin-top:12px;display:flex;gap:8px"><button class="act" id="login" style="flex:1">ログイン</button><button class="act gh" id="signup">新規登録</button></div><div id="msg" style="margin-top:8px"></div><button class="act gh sm" id="reset" style="margin-top:12px">接続先を変更</button>`);
  el('login').onclick=async()=>{const {error}=await sb.auth.signInWithPassword({email:el('email').value.trim(),password:el('pw').value});el('msg').innerHTML=error?`<span class="bad">${esc(error.message)}</span>`:`<span class="ok">OK</span>`;};

/* ===== 全国マップ ===== */
function viewJp(){
  const withxy=S.sites.filter(s=>s.lat!=null&&s.lng!=null);
  const note=withxy.length?'':'<div class="banner">拠点の緯度経度が未設定です。<b>migrate_拠点座標.sql</b> をSupabaseで実行すると、地図に拠点が表示されます。</div>';
  const mapCard=`<div class="card"><h2>全国マップ・概況</h2><p class="lead">ピンをクリックすると、その拠点の概要（圃場数・個体・測定率・CO₂・作業費・証拠整備率）が吹き出しで表示されます。「この拠点を開く」で地区マップへ。ピンはドラッグで微調整でき、離すと保存されます。下に全国の集計サマリーを表示します。</p>
   <div id="jpmap" style="height:46vh;min-height:300px;border:1px solid var(--line);border-radius:14px;overflow:hidden"></div>
   ${note}</div>`;
  return mapCard + viewDash(true);
}
async function initJpMap(){
  const box=el('jpmap'); if(!box)return;
  if(!await ensureL()){box.innerHTML='<div style="padding:24px;color:#777;font-size:13px;text-align:center">地図ライブラリを読み込めませんでした。ネットワークを確認して再読み込みしてください。</div>';return;}
  const map=L.map('jpmap');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(map);
  const pts=S.sites.filter(s=>s.lat!=null&&s.lng!=null);
  const D=S.dash;
  if(pts.length){
    const icon=L.divIcon({className:'',html:'<div style="width:18px;height:18px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:#2f4a32;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>',iconSize:[18,18],iconAnchor:[9,18]});
    pts.forEach(s=>{
      const m=L.marker([s.lat,s.lng],{draggable:true,icon}).addTo(map);
      const fs=(D&&D.fields)?D.fields.filter(f=>f.site_id===s.id):[];
      const tr=fs.reduce((a,f)=>a+f.trees,0),me=fs.reduce((a,f)=>a+f.measured,0),co=fs.reduce((a,f)=>a+f.co2,0),cost=fs.reduce((a,f)=>a+f.cost,0),pc=fs.length?fs.reduce((a,f)=>a+f.pct,0)/fs.length:0;
      const short=s.name.replace(/（.*/,'');
      const tip=(D&&D.fields)?`<b>${esc(short)}</b><br>個体 ${fmtT(tr)}本・CO₂ ${co.toFixed(2)}t`:`<b>${esc(short)}</b>`;
      m.bindTooltip(tip,{permanent:true,direction:'top',offset:[0,-16],opacity:0.96,className:'jp-tip'});
      const info=(D&&D.fields)?`<div style="margin-top:5px;font-size:12px;line-height:1.7"><b>圃場</b> ${fs.length}　<b>個体</b> ${fmtT(tr)}本（測定 ${tr?Math.round(me/tr*100):0}%）<br><b>推定CO₂</b> ${co.toFixed(3)} t<br><b>作業費</b> ${cost?'¥'+Number(cost).toLocaleString('ja-JP'):'—'}<br><b>証拠整備率</b> ${pc.toFixed(1)}%</div>`:'<div style="margin-top:4px;font-size:12px;color:#777">概況を集計中…</div>';
      m.bindPopup(`<div style="min-width:190px"><b style="font-size:14px">${esc(s.name)}</b>${info}<button onclick="openSiteFromMap('${esc(s.id)}')" style="margin-top:8px;background:#2f4a32;color:#fff;border:0;border-radius:8px;padding:7px 10px;font-weight:700;cursor:pointer;width:100%">この拠点を開く</button></div>`);
      m.on('dragend',async e=>{const ll=e.target.getLatLng();s.lat=ll.lat;s.lng=ll.lng;await sb.from('sites').update({lat:ll.lat,lng:ll.lng}).eq('id',s.id);});
    });
    map.fitBounds(pts.map(s=>[s.lat,s.lng]),{padding:[60,60],maxZoom:9});
  } else { map.setView([37.5,137.0],5); }
  setTimeout(()=>map.invalidateSize(),140);
}
window.openSiteFromMap=async (id)=>{S.site=id;S.field=null;S.entryField=null;await loadSite(id);S.tab='district';render();};

/* ===== 地区マップ（航空写真の上に圃場ポリゴンを描く・画像ベース） ===== */
const DISTRICT_PALETTE=['#e4572e','#f3a712','#3fa34d','#4d80e4','#9b5de5','#2a9d8f','#e07a5f','#c9184a'];
const DIST={edit:false,field:null,verts:[],url:null,drag:-1,moved:false};
function fieldColor(i){return DISTRICT_PALETTE[i%DISTRICT_PALETTE.length];}
function viewDistrict(){
  if(!S.site) return `<div class="card"><h2>地区マップ</h2><p class="lead">上の地区（拠点）を選ぶか、全国マップのピンから開いてください。</p></div>`;
  const site=S.sites.find(s=>s.id===S.site);const title=esc(site?site.name:'');
  if(!S.fields.length) return `<div class="card"><h2>${title} ・ 地区マップ</h2><p class="lead">この地区に圃場がありません。</p></div>`;
  const counts=S.fields.map((f,i)=>({f,i,n:S.trees.filter(t=>t.field_id===f.id).length,has:!!(f.boundary&&f.boundary.pts)}));
  const total=counts.reduce((a,b)=>a+b.n,0);
  const chips=counts.map(x=>{const sel=DIST.edit&&DIST.field===x.f.id;return `<button data-distfield="${x.f.id}" style="display:inline-flex;align-items:center;gap:7px;border:2px solid ${sel?fieldColor(x.i):'var(--line)'};background:${sel?'rgba(0,0,0,.05)':'transparent'};border-radius:999px;padding:6px 13px;margin:3px 6px 3px 0;font-weight:700;font-size:12px;cursor:pointer;color:var(--ink)"><span style="width:11px;height:11px;border-radius:50%;background:${fieldColor(x.i)};display:inline-block"></span>${esc(x.f.name)}<span class="mono" style="color:var(--muted)">${x.n}本</span>${x.has?'':' <span class="mono" style="color:var(--danger);font-size:10px">境界なし</span>'}</button>`;}).join('');
  const editBtn=`<button class="act ${DIST.edit?'':'gh'} sm" id="distEditToggle">${DIST.edit?'編集を終了':'境界を編集'}</button>`;
  const editBar=DIST.edit?`<div class="banner" style="margin-top:8px"><b>編集モード</b>：上のチップで圃場を選び、航空写真の上をクリックして頂点を追加（点はドラッグで移動）。一周ぶん置いたら「保存」。<div class="controls" style="margin-top:8px"><button class="act gh sm" id="distUndo">1点戻す</button><button class="act gh sm" id="distClear">クリア</button><button class="act sm" id="distSave">保存</button><button class="act gh sm" id="distDel">この圃場の境界を削除</button></div></div>`:'';
  if(!site||!site.overlay_path){
    return `<div class="card"><h2>${title} ・ 地区マップ</h2><p class="lead">${title}の航空写真が未登録です。Supabaseの <b>field-docs</b> バケットに <span class="mono">overlays/${esc(S.site)}.jpg</span> をアップロードすると、ここに表示され、上に境界を描けます。</p></div>`;
  }
  return `<div class="card"><h2>${title} ・ 地区マップ</h2>
     <p class="lead">航空写真の上に各圃場の輪郭を色分け表示します（${S.fields.length}圃場・計${total}本）。${DIST.edit?'':'ポリゴンやチップをクリックでその圃場の詳細マップへ。境界を引くには「境界を編集」。'}</p>
     <div style="margin:4px 0 8px">${editBtn}</div>
     <div style="margin:2px 0">${chips}</div>${editBar}
     <div id="distwrap" style="position:relative;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#0d0d0d;margin-top:10px">
       <img id="distimg" alt="" style="display:block;width:100%;height:auto"/>
       <svg id="distsvg" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;${DIST.edit?'cursor:crosshair':''}"></svg>
       <div id="disthandles" style="position:absolute;inset:0;pointer-events:none"></div>
     </div></div>`;
}
async function initDistrictImg(){
  const site=S.sites.find(s=>s.id===S.site);if(!site||!site.overlay_path)return;
  const img=el('distimg');if(!img)return;
  img.onload=()=>drawDistOverlay();
  try{const {data}=await sb.storage.from('field-docs').createSignedUrl(site.overlay_path,3600);if(data&&data.signedUrl){DIST.url=data.signedUrl;img.src=data.signedUrl;}}catch(e){}
  if(img.complete&&img.naturalWidth)drawDistOverlay();
}
function ptStr(pts){return pts.map(p=>`${(p[0]*100).toFixed(2)},${(p[1]*100).toFixed(2)}`).join(' ');}
function drawDistOverlay(){
  const svg=el('distsvg'),handles=el('disthandles');if(!svg)return;
  let poly='';
  if(DIST.edit)poly+=`<rect x="0" y="0" width="100" height="100" fill="#000" fill-opacity="0" pointer-events="all"></rect>`;
  S.fields.forEach((f,i)=>{
    if(!(f.boundary&&f.boundary.pts&&f.boundary.pts.length>=3))return;
    if(DIST.edit&&DIST.field===f.id)return;
    poly+=`<polygon points="${ptStr(f.boundary.pts)}" fill="${fieldColor(i)}" fill-opacity="0.40" stroke="#fff" stroke-width="2" vector-effect="non-scaling-stroke" style="${DIST.edit?'':'cursor:pointer'}" data-openpoly="${f.id}"></polygon>`;
  });
  if(DIST.edit&&DIST.verts.length){poly+=`<polygon id="distwork" points="${ptStr(DIST.verts)}" fill="#e4572e" fill-opacity="0.25" stroke="#fff" stroke-width="2" stroke-dasharray="5 4" vector-effect="non-scaling-stroke"></polygon>`;}
  svg.innerHTML=poly;
  if(!DIST.edit){svg.querySelectorAll('[data-openpoly]').forEach(p=>p.onclick=()=>{S.field=p.getAttribute('data-openpoly');S.tab='map';closeDrawer();render();});}
  handles.innerHTML='';
  if(DIST.edit){
    DIST.verts.forEach((v,idx)=>{
      const h=document.createElement('div');
      h.style.cssText=`position:absolute;left:${v[0]*100}%;top:${v[1]*100}%;width:14px;height:14px;border-radius:50%;background:#e4572e;border:2px solid #fff;box-shadow:0 0 3px rgba(0,0,0,.7);transform:translate(-50%,-50%);pointer-events:auto;cursor:grab;touch-action:none`;
      h.onpointerdown=(e)=>{e.preventDefault();e.stopPropagation();DIST.drag=idx;DIST.moved=false;try{h.setPointerCapture(e.pointerId);}catch(_){}}; 
      handles.appendChild(h);
    });
  }
  S.fields.forEach((f,i)=>{
    if(!(f.boundary&&f.boundary.pts&&f.boundary.pts.length>=3))return;
    if(DIST.edit&&DIST.field===f.id)return;

function buildMap(f,metric,idsuf){metric=metric||S.metric;idsuf=idsuf||'';

  const grid=(trees[0].pos_ew!=null);

  const mn=vals.length?Math.min(...vals):0,mx=vals.length?Math.max(...vals):1;
  const norm=v=>mx>mn?(v-mn)/(mx-mn):0.5;

  const ml=metric==='co2'?'CO₂':(metric==='h'?'樹高':'DBH');
  const bars=(function(){const MAXBAR=ov?34:(grid?20:60),bw=ov?5:6;return trees.map(t=>{const[cx,cy]=pos(t);const v=metricVal(t.id,S.round,metric);if(v==null)return `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="2.6" fill="#c9c4b6" data-id="${t.id}" pointer-events="all"><title>${esc(t.label||'')} (計測なし)</title></circle>`;const H=5+norm(v)*MAXBAR;let g;if(metric==='h'){const tw=Math.max(2,H*0.12),tt=cy-H*0.55,cR=Math.max(5,H*0.32);g=`<rect x="${(cx-tw/2).toFixed(1)}" y="${tt.toFixed(1)}" width="${tw.toFixed(1)}" height="${(cy-tt).toFixed(1)}" rx="${(tw/2).toFixed(1)}" fill="#7a5a39"/><circle cx="${(cx-cR*0.7).toFixed(1)}" cy="${tt.toFixed(1)}" r="${(cR*0.8).toFixed(1)}" fill="#5f8a4f" stroke="#fff" stroke-width="0.5"/><circle cx="${(cx+cR*0.7).toFixed(1)}" cy="${tt.toFixed(1)}" r="${(cR*0.8).toFixed(1)}" fill="#5f8a4f" stroke="#fff" stroke-width="0.5"/><circle cx="${cx.toFixed(1)}" cy="${(tt-cR*0.55).toFixed(1)}" r="${cR.toFixed(1)}" fill="#4f7a43" stroke="#fff" stroke-width="0.5"/>`;}else{g=`<rect x="${(cx-bw/2).toFixed(1)}" y="${(cy-H).toFixed(1)}" width="${bw}" height="${H.toFixed(1)}" rx="${(bw/2).toFixed(1)}" fill="#5f8a4f" stroke="#ffffff" stroke-width="0.8"/><circle cx="${cx.toFixed(1)}" cy="${(cy-H).toFixed(1)}" r="${(bw/2+1.2).toFixed(1)}" fill="#3e6043"/>`;}return `<g data-id="${t.id}" pointer-events="all"><title>${esc(t.label||'')} ${fmt(v,2)+unit}</title>${g}</g>`;}).join('');})();
  const marks=S.viz==='height'?bars:circles;
  let overlay='';

  }

    const byCol={};trees.forEach(t=>{const c=(String(t.label).match(/^[A-Za-z]+/)||[''])[0];(byCol[c]=byCol[c]||[]).push(t);});

  }

  return `<div class="maparea"><svg id="mapsvg${idsuf}" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" preserveAspectRatio="xMidYMid meet">${bg}${marks}${overlay}</svg></div>
   ${legend}`;
}
function sparkChart(ms){const W=360,H=120,pad=22;const vals=ms.map(m=>{const c=co2(m);return c?c.kg:0;});const mx=Math.max(1,...vals);const n=ms.length;const bw=(W-pad*2)/n*0.5;const bars=ms.map((m,i)=>{const v=vals[i];const x=pad+(W-pad*2)*(n===1?0.5:i/(n-1))-bw/2;const h=(H-34)*(v/mx);const y=H-20-h;return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="#3e6043"/><text x="${(x+bw/2).toFixed(1)}" y="${(y-3).toFixed(1)}" font-size="9" text-anchor="middle" fill="#2f4a32" font-family="JetBrains Mono">${fmt(v,1)}</text><text x="${(x+bw/2).toFixed(1)}" y="${H-6}" font-size="8" text-anchor="middle" fill="#6f7560">${m.measured_on.slice(5).replace('-','/')}</text>`;}).join('');return `<svg viewBox="0 0 ${W} ${H}" width="100%">${bars}</svg>`;}

     <div id="bulkres"><p class="lead">ファイルを選ぶと、ここに振り分け結果が出ます。</p></div>

function matchTree(fn,trees){const base=fn.replace(/\.[^.]+$/,'').trim();const m=base.match(/^([A-Za-z]+\d+)/);const key=(m?m[1]:base).toUpperCase();let t=trees.find(x=>String(x.label||'').toUpperCase()===key);if(!t)t=trees.find(x=>String(x.epc||'').toUpperCase()===base.toUpperCase());return t||null;}
function bindPhotosImport(){const fi=el('p_files');if(!fi)return;const pd=el('p_date');if(pd)pd.onchange=()=>{S.photoDate=pd.value;};fi.onchange=e=>{pendingPhotos=[...e.target.files];previewPhotos();};}
function previewPhotos(){
  const box=el('bulkres');if(!box)return;
  const f=S.fields.find(x=>x.id===S.entryField);const trees=S.trees.filter(t=>t.field_id===f.id);
  const rows=pendingPhotos.map(fl=>({fl,t:matchTree(fl.name,trees)}));
  const ok=rows.filter(r=>r.t).length,ng=rows.length-ok;
  const list=rows.map(r=>`<tr><td>${esc(r.fl.name)}</td><td>${r.t?esc(r.t.label||r.t.epc||''):'<span style="color:var(--danger)">未対応</span>'}</td></tr>`).join('');
  box.innerHTML=`<p class="lead"><b>${rows.length}</b>件選択 ・ 振り分け成功 <b>${ok}</b> ・ 未対応 <b>${ng}</b></p>
    <div style="overflow:auto;max-height:44vh"><table><thead><tr><th>ファイル名</th><th>振り分け先（記号）</th></tr></thead><tbody>${list}</tbody></table></div>
    <button class="act" id="p_run" style="margin-top:10px" ${ok?'':'disabled'}>${ok}件を取り込む</button>
    <div id="p_msg" class="lead" style="margin-top:6px"></div>`;
  const run=el('p_run');if(run)run.onclick=()=>runPhotosImport(rows.filter(r=>r.t));
}
async function runPhotosImport(rows){
  const date=(el('p_date')&&el('p_date').value)?el('p_date').value:null;
  const msg=el('p_msg');let done=0,skip=0;
  const tids=[...new Set(rows.map(r=>r.t.id))];const existing=new Set();
  for(let i=0;i<tids.length;i+=150){const {data}=await sb.from('tree_photos').select('tree_id,caption').in('tree_id',tids.slice(i,i+150));(data||[]).forEach(p=>existing.add(p.tree_id+'::'+(p.caption||'')));}
  for(const r of rows){
    if(existing.has(r.t.id+'::'+r.fl.name)){skip++;continue;}
    const path=`${r.t.id}/${Date.now()}-${r.fl.name.replace(/[^\w.\-]/g,'_')}`;
    const up=await sb.storage.from('tree-photos').upload(path,r.fl);
    if(up.error){if(msg)msg.innerHTML=`<span class="bad">${esc(r.fl.name)}: ${esc(up.error.message)}</span>`;continue;}
    const taken=await photoTakenDate(r.fl,date);const {error}=await sb.from('tree_photos').insert({tree_id:r.t.id,taken_on:taken,storage_path:path,caption:r.fl.name,created_by:S.session.user.id});
    if(error){if(msg)msg.innerHTML=`<span class="bad">記録失敗 ${esc(r.fl.name)}: ${esc(error.message)}</span>`;continue;}
    done++;if(msg)msg.textContent=`取込中… ${done}/${rows.length}`;
  }
  if(msg)msg.innerHTML=`<span class="ok">完了：${done}件を取り込みました${skip?`（既存${skip}件はスキップ）`:''}。圃場マップで個体をクリックすると表示されます。</span>`;
}

const fmtT=n=>(n==null||isNaN(n))?'—':Number(n).toLocaleString('ja-JP');
async function dpAll(table,cols){let all=[],from=0;const page=1000;for(;;){const {data,error}=await sb.from(table).select(cols).range(from,from+page-1);if(error)throw error;all=all.concat(data||[]);if(!data||data.length<page)break;from+=page;}return all;}
async function loadDash(){
  try{
  const [fr,er,cr,wr]=await Promise.all([
    sb.from('fields').select('id,site_id,name,area_sqm,manager,established_on,planted_date').limit(100000),
    sb.from('field_evidence').select('field_id,er_code,status').limit(100000),
    sb.from('er_catalog').select('code,section').limit(2000),
    sb.from('work_logs').select('field_id,work_date,cost_yen,status,cost_type').limit(100000),
  ]);
  const trees=await dpAll('trees','id,field_id');
  const meas=await dpAll('measurements','tree_id,measured_on,co2_kg');
  const fields=fr.data||[],ev=er.data||[],cat=cr.data||[],wls=wr.data||[];
  const wcost={},wplan={},cMonth={},cType={};wls.forEach(w=>{const v=+w.cost_yen||0;if(w.status==='planned'){wplan[w.field_id]=(wplan[w.field_id]||0)+v;return;}wcost[w.field_id]=(wcost[w.field_id]||0)+v;if(w.work_date){const ym=String(w.work_date).slice(0,7);cMonth[ym]=(cMonth[ym]||0)+v;}const ct=w.cost_type||'その他';cType[ct]=(cType[ct]||0)+v;});
  const t2f={},tfc={};trees.forEach(t=>{t2f[t.id]=t.field_id;tfc[t.field_id]=(tfc[t.field_id]||0)+1;});
  const mset={},mlatest={},mco2={};
  meas.forEach(m=>{const fid=t2f[m.tree_id];if(!fid)return;(mset[fid]=mset[fid]||new Set()).add(m.tree_id);if(m.measured_on&&(!mlatest[fid]||String(m.measured_on)>mlatest[fid]))mlatest[fid]=String(m.measured_on);if(m.co2_kg!=null)mco2[fid]=(mco2[fid]||0)+Number(m.co2_kg);});
  const c2s={};cat.forEach(c=>c2s[c.code]=c.section);
  const evf={},sec={};
  ev.forEach(e=>{const a=evf[e.field_id]=evf[e.field_id]||{done:0,collecting:0,todo:0,total:0};a.total++;a[e.status]=(a[e.status]||0)+1;const sn=c2s[e.er_code]||'その他';const b=sec[sn]=sec[sn]||{done:0,collecting:0,todo:0,total:0};b.total++;b[e.status]=(b[e.status]||0)+1;});
  const sname={},sidx={};S.sites.forEach((s,i)=>{sname[s.id]=s.name;sidx[s.id]=i;});
  const F=fields.map(f=>{const e0=evf[f.id]||{done:0,collecting:0,todo:0,total:51};const total=e0.total||51;const measured=mset[f.id]?mset[f.id].size:0;return{site_id:f.site_id,site:sname[f.site_id]||f.site_id,name:f.name,manager:f.manager||null,established:f.established_on||f.planted_date||null,area:f.area_sqm,trees:tfc[f.id]||0,measured,latest:mlatest[f.id]||null,co2:(mco2[f.id]||0)/1000,cost:wcost[f.id]||0,costPlan:wplan[f.id]||0,done:e0.done||0,collecting:e0.collecting||0,todo:e0.todo||0,evtotal:total,pct:((e0.done||0)+(e0.collecting||0)*0.5)/total*100};});
  F.sort((a,b)=>((sidx[a.site_id]??9)-(sidx[b.site_id]??9))||String(a.name).localeCompare(b.name,'ja'));
  const sections=Object.entries(sec).map(([k,v])=>({section:k,done:v.done,collecting:v.collecting,todo:v.todo,total:v.total})).sort((a,b)=>(parseInt(a.section)||99)-(parseInt(b.section)||99));
  S.dash={fields:F,sections,costMonthly:cMonth,costByType:cType,at:new Date()};
  }catch(e){S.dash={error:String((e&&e.message)||e),fields:[],sections:[],at:new Date()};}
}

function freqDays(fr){fr=fr||'';if(/随時|発見時|発生時|発生|時/.test(fr)&&!/月|週|半年|四半期|年/.test(fr))return null;if(/四半期/.test(fr))return 90;if(/半年/.test(fr))return 180;if(/年1回|年１回/.test(fr))return 365;if(/毎週|週1|週１/.test(fr))return 7;return 30;}

  const logByDate={};logs.forEach(w=>{if(w.work_date)(logByDate[w.work_date]=logByDate[w.work_date]||[]).push(w);});
  const sopDue={};(S.sops||[]).forEach(s=>{const d=freqDays(s.frequency);if(d==null)return;const ls=logs.filter(w=>w.sop_code===s.code&&w.status!=='planned').map(w=>w.work_date).filter(Boolean).sort();const last=ls.length?ls[ls.length-1]:null;if(!last)return;const nd=new Date(last);nd.setDate(nd.getDate()+d);const ds=nd.toISOString().slice(0,10);(sopDue[ds]=sopDue[ds]||[]).push(s.name);});
  const dow=['日','月','火','水','木','金','土'];
  let cells='';for(let i=0;i<startDow;i++)cells+='<div class="calcell calempty"></div>';
  for(let dd=1;dd<=dim;dd++){const ds=`${wy}-${String(wmo).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;const isT=ds===today;
    const items=(logByDate[ds]||[]).map(w=>{const lbl=w.sop_code?wlSopName(w.sop_code):(w.category||'作業');const col=w.status==='planned'?'#c8742d':'#3a7d52';const tip=esc(lbl)+(w.worker?(' / '+esc(w.worker)):'')+(w.cost_yen!=null?(' / ¥'+Number(w.cost_yen).toLocaleString('ja-JP')):'');return `<div class="calchip" style="background:${col}" title="${tip}">${w.status==='planned'?'予 ':''}${esc(lbl)}</div>`;}).join('');

  const calHtml=`<div class="card"><h2>${esc(f.name)} ・ 作業カレンダー</h2>

    </div>
    <div class="calgrid">${dow.map((d,i)=>`<div class="caldow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('')}${cells}</div></div>`;

  const costDone=logs.filter(w=>w.status!=='planned').reduce((a,w)=>a+(+w.cost_yen||0),0);

  const myStaff=(S.staff||[]).filter(s=>s.site_id===S.site);

  const staffRow=s=>`<tr><td><strong>${esc(s.name)}</strong></td><td>${esc(s.role||'—')}</td><td><select class="stafffield" data-id="${s.id}" style="font-size:12px;max-width:130px"><option value="" ${!s.field_id?'selected':''}>拠点共通（全圃場）</option>${stFieldOpts(s.field_id)}</select></td><td>${esc(s.phone||'—')}</td><td>${s.active===false?'<span style="color:var(--muted)">停止</span>':'<span style="color:#3a7d52;font-weight:700">稼働</span>'}</td><td><button class="act gh sm" data-stafftoggle="${s.id}" data-act="${s.active===false?'0':'1'}">${s.active===false?'再開':'停止'}</button> <button class="act gh sm" data-delstaff="${s.id}">削除</button></td></tr>`;
  const stGroup=(title,rows)=>`<tr><td colspan="6" style="background:rgba(58,125,82,.10);font-weight:700;padding:6px 8px">${esc(title)}　<span style="color:var(--muted);font-weight:400">${rows.length}名</span></td></tr>`+(rows.map(staffRow).join('')||'<tr><td colspan="6" style="color:var(--muted);padding:5px 8px">—</td></tr>');
  let staffRows=S.fields.map(f=>stGroup(f.name,myStaff.filter(s=>s.field_id===f.id))).join('')+stGroup('拠点共通（全圃場）',myStaff.filter(s=>!s.field_id));
  if(!myStaff.length)staffRows='<tr><td colspan="6" style="color:var(--muted)">この拠点の担当者は未登録です。下で追加できます。</td></tr>';
  const sopMasterRows=(S.sops||[]).map(s=>`<tr><td class="mono" style="font-size:11px">${esc(s.code)}</td><td><input id="sn_${esc(s.code)}" value="${esc(s.name||'')}" style="width:140px"></td><td><input id="sf_${esc(s.code)}" value="${esc(s.frequency||'')}" style="width:150px"></td><td><input id="sp_${esc(s.code)}" value="${esc(s.purpose||'')}" style="width:190px"></td><td><button class="act gh sm" data-sopsave="${esc(s.code)}">保存</button> <button class="act gh sm" data-delsop="${esc(s.code)}">削除</button></td></tr>`).join('')||'<tr><td colspan="5" style="color:var(--muted)">未定義です。下で追加できます。</td></tr>';

function ccStockTco2(fieldIds){let kg=0;const fset=new Set(fieldIds);S.trees.forEach(t=>{if(!fset.has(t.field_id))return;if(t.alive===false)return;const m=measFor(t.id,'latest');if(!m)return;const c=co2(m);const v=c?c.kg:(m.co2_kg||0);kg+=(+v||0);});return kg/1000;}

function viewCredit(){
  const site=S.sites.find(s=>s.id===S.site)||{};
  const projects=(S.projects||[]).filter(p=>p.site_id===S.site);
  const projSeg=projects.length?(`<div class="seg" data-seg="ccproj">`+projects.map(p=>`<button class="${p.id===S.creditProj?'on':''}" data-v="${p.id}">${esc(p.name)}</button>`).join('')+`</div>`):'<span class="lead">この拠点のプロジェクトはまだありません。下のフォームで作成してください。</span>';
  const head=`<div class="card"><h2>カーボンクレジット — ${esc(site.name||'')}</h2>
    <p class="lead">創出プロジェクト（拠点単位）ごとに、認証までの工程と、発行されたクレジットの在庫・取引台帳を管理します。</p>

    <details style="margin-top:6px"><summary style="cursor:pointer;color:var(--muted);font-size:13px;font-weight:700">＋ 新しいプロジェクトを作成</summary>

      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line)"><h2 style="font-size:14px">取引を記録</h2>
        <div class="controls">
          <div class="ctl"><span class="lab">発行ロット</span><select id="ct_iss">${issOpts}</select></div>
          <div class="ctl"><span class="lab">区分</span><select id="ct_type">${CC_TXN.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}</select></div>

  return head+infoCard+stageCard+reqCard+partiesCard+activitiesCard+issCard+txCard+delCard;
}

/* ===== カメラ計測（標尺・基準スケール法） ===== */
const CAM={img:null,file:null,pts:[],fieldId:null,treeId:null};
function camTreesFor(fid){return (S.trees||[]).filter(t=>t.field_id===fid).sort((a,b)=>String(a.label||a.epc||'').localeCompare(String(b.label||b.epc||''),'ja',{numeric:true}));}
function viewCam(){
  if(!S.fields.length) return `<div class="card"><p class="lead">この拠点に圃場がありません。</p></div>`;
  const fid=(CAM.fieldId&&S.fields.find(f=>f.id===CAM.fieldId))?CAM.fieldId:(S.fields[0]&&S.fields[0].id);CAM.fieldId=fid;
  const trees=camTreesFor(fid);
  if(!CAM.treeId||!trees.find(t=>t.id===CAM.treeId))CAM.treeId=trees[0]?trees[0].id:null;
  const fieldOpts=S.fields.map(f=>`<option value="${f.id}" ${f.id===fid?'selected':''}>${esc(f.name)}</option>`).join('');
  const treeOpts=trees.map(t=>`<option value="${t.id}" ${t.id===CAM.treeId?'selected':''}>${esc(t.label||t.epc||t.id.slice(0,6))}</option>`).join('')||'<option value="">（個体なし）</option>';
  const today=new Date().toISOString().slice(0,10);
  return `<div class="card"><h2>カメラ計測（標尺で樹高自動）</h2>
    <p class="lead">標尺を苗のそばに立てて撮影し、写真上を <b>①標尺の目盛りA → ②目盛りB → ③苗の根元 → ④苗の先端</b> の順にタップ。A–B間の実長(m)を入れると樹高を自動計算します。太さ(DBH)は別途手入力。高木で標尺に収まらない場合は角度法（今後追加）に切替推奨。</p>
    <div style="display:flex;flex-direction:column;gap:10px;max-width:520px">
      <div><div style="font-size:12px;color:var(--ink2);margin-bottom:3px">圃場</div><select id="cam_field" style="width:100%">${fieldOpts}</select></div>
      <div><div style="font-size:12px;color:var(--ink2);margin-bottom:3px">個体(TreeID/記号)</div><select id="cam_tree" style="width:100%">${treeOpts}</select></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div style="flex:1;min-width:140px"><div style="font-size:12px;color:var(--ink2);margin-bottom:3px">計測日</div><input type="date" id="cam_date" value="${today}" style="width:100%"></div>
        <div style="flex:1;min-width:140px"><div style="font-size:12px;color:var(--ink2);margin-bottom:3px">標尺A–B間の実長(m)</div><input type="number" id="cam_reflen" step="0.01" value="1.00" style="width:100%"></div>
      </div>
    </div>
    <div style="margin:10px 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button type="button" class="act" id="cam_shoot">📷 撮影</button>
      <button type="button" class="act gh" id="cam_pick">🖼 画像を選ぶ</button>
      <button type="button" class="act gh sm" id="cam_undo">1点戻す</button><button type="button" class="act gh sm" id="cam_reset">タップやり直し</button>
      <input id="cam_file" type="file" accept="image/*" capture="environment" style="display:none">
      <input id="cam_file2" type="file" accept="image/*" style="display:none"></div>
    <div style="position:relative;max-width:520px"><canvas id="camcanvas" style="width:100%;display:block;border:1px solid var(--line);border-radius:12px;background:#0d0d0d;touch-action:none"></canvas>
      <div id="cam_hint" style="position:absolute;left:8px;top:8px;background:rgba(0,0,0,.62);color:#fff;font-size:12px;padding:3px 8px;border-radius:8px">写真を選ぶと表示されます</div></div>
    <div class="stats" style="margin-top:12px">
      <div class="stat"><div class="k">自動算出 樹高</div><div class="v" id="cam_height">–<small>m</small></div></div>
      <div class="stat"><div class="k">太さ DBH(cm)</div><div class="v"><input type="number" id="cam_dbh" step="0.1" style="width:90px;font-size:18px" placeholder="手入力"></div></div>
      <div class="stat"><div class="k">推定CO₂</div><div class="v" id="cam_co2">–<small>kg</small></div></div>
    </div>
    <div style="margin-top:12px"><button class="act" id="cam_save">この個体に計測を保存</button> <span id="cam_msg"></span></div>
  </div>`;
}
function camXY(e,c){const r=c.getBoundingClientRect();return [(e.clientX-r.left)*(c.width/r.width),(e.clientY-r.top)*(c.height/r.height)];}
function camFit(){const c=el('camcanvas');if(!c||!CAM.img)return;const m=1600,iw=CAM.img.naturalWidth,ih=CAM.img.naturalHeight,s=Math.min(1,m/Math.max(iw,ih));c.width=Math.round(iw*s);c.height=Math.round(ih*s);}
function drawCam(){const c=el('camcanvas');if(!c||!CAM.img)return;const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);ctx.drawImage(CAM.img,0,0,c.width,c.height);const cols=['#4d80e4','#4d80e4','#e4572e','#e4572e'],labs=['A','B','根','先'],R=Math.max(7,c.width*0.012),LW=Math.max(2,c.width*0.005);CAM.pts.forEach((p,i)=>{ctx.beginPath();ctx.fillStyle=cols[i];ctx.strokeStyle='#fff';ctx.lineWidth=LW;ctx.arc(p[0],p[1],R,0,7);ctx.fill();ctx.stroke();ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(16,c.width*0.032)}px sans-serif`;ctx.fillText(labs[i],p[0]+R+4,p[1]-4);});const line=(a,b,col)=>{if(!a||!b)return;ctx.strokeStyle=col;ctx.lineWidth=LW;ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.stroke();};line(CAM.pts[0],CAM.pts[1],'#4d80e4');line(CAM.pts[2],CAM.pts[3],'#e4572e');}
function camHeight(){if(CAM.pts.length<4)return null;const d=(a,b)=>Math.hypot(a[0]-b[0],a[1]-b[1]);const refPx=d(CAM.pts[0],CAM.pts[1]),treePx=d(CAM.pts[2],CAM.pts[3]),refLen=parseFloat((el('cam_reflen')||{}).value)||0;if(refPx<=0||!refLen)return null;return refLen*treePx/refPx;}
function camUpdate(){const h=camHeight();const hp=el('cam_height');if(hp)hp.innerHTML=(h!=null?h.toFixed(2):'–')+'<small>m</small>';const dbh=(el('cam_dbh')||{}).value;const co=co2({height_m:h,dbh_cm:dbh});const cp=el('cam_co2');if(cp)cp.innerHTML=(co?fmt(co.kg,2):'–')+'<small>kg</small>';const hint=el('cam_hint');if(hint)hint.textContent=!CAM.img?'写真を選ぶと表示されます':(CAM.pts.length<4?`タップ ${CAM.pts.length}/4：${['①標尺A','②標尺B','③苗の根元','④苗の先端'][CAM.pts.length]||''}`:(h!=null?`樹高 ${h.toFixed(2)}m`:'A–B実長を入力'));}
async function camSave(){const msg=el('cam_msg'),set=h=>{if(msg)msg.innerHTML=h;};
  if(!CAM.treeId){set('<span class="bad">個体を選んでください。</span>');return;}
  if(!CAM.file){set('<span class="bad">写真を撮影／選択してください。</span>');return;}
  const date=el('cam_date').value;if(!date){set('<span class="bad">計測日を入れてください。</span>');return;}
  const h=camHeight(),dbhv=el('cam_dbh').value;set('<span class="lead">保存中…</span>');
  const path=`${CAM.treeId}/${Date.now()}-cam.jpg`;
  const up=await sb.storage.from('tree-photos').upload(path,CAM.file);
  if(up.error){set('<span class="bad">写真アップロード失敗：'+esc(up.error.message)+'</span>');return;}
  await sb.from('tree_photos').insert({tree_id:CAM.treeId,taken_on:date,storage_path:path,caption:'カメラ計測',created_by:S.session.user.id});
  const m={tree_id:CAM.treeId,measured_on:date,height_m:h!=null?+h.toFixed(3):null,dbh_cm:dbhv===''?null:+dbhv,root_d_cm:null,photo_path:path};
  const c=co2(m);m.co2_kg=c?c.kg:null;m.estimated=c?c.est:false;m.created_by=S.session.user.id;
  await sb.from('measurements').delete().eq('tree_id',CAM.treeId).eq('measured_on',date);
  const {error}=await sb.from('measurements').insert(m);
  if(error){set('<span class="bad">計測保存失敗：'+esc(error.message)+'</span>');return;}
  S.dash=null;await loadSite(S.site);
  set('<span class="ok">保存しました（樹高 '+(h!=null?h.toFixed(2)+'m':'—')+'／DBH '+(dbhv||'—')+'cm）。続けて別の個体も計測できます。</span>');
  CAM.file=null;CAM.img=null;CAM.pts=[];const c2=el('camcanvas');if(c2){const cx=c2.getContext('2d');cx&&cx.clearRect(0,0,c2.width,c2.height);}camUpdate();}
function initCam(){const c=el('camcanvas');if(!c)return;
  const ff=el('cam_field');if(ff)ff.onchange=()=>{CAM.fieldId=ff.value;CAM.treeId=null;render();};
  const tf=el('cam_tree');if(tf)tf.onchange=()=>{CAM.treeId=tf.value;};
  const loadF=fl=>{if(!fl)return;CAM.file=fl;const img=new Image();img.onload=()=>{CAM.img=img;CAM.pts=[];camFit();drawCam();camUpdate();};img.onerror=()=>{const h=el('cam_hint');if(h)h.textContent='画像を表示できませんでした。別の写真でお試しください。';};img.src=URL.createObjectURL(fl);};
  const cf=el('cam_file');if(cf)cf.onchange=e=>loadF(e.target.files[0]);
  const cf2=el('cam_file2');if(cf2)cf2.onchange=e=>loadF(e.target.files[0]);
  const shoot=el('cam_shoot');if(shoot)shoot.onclick=()=>{const i=el('cam_file');if(i)i.click();};

async function saveAll(){const f=S.fields.find(x=>x.id===S.entryField);if(!f)return;const date=el('e_date').value;const trees=S.trees.filter(t=>t.field_id===f.id);const rows=[];trees.forEach(t=>{const h=val('h',t.id),dbh=val('dbh',t.id),rd=val('rd',t.id);if(h===''&&dbh===''&&rd==='')return;const c=co2({height_m:h,dbh_cm:dbh,root_d_cm:rd});rows.push({tree_id:t.id,measured_on:date,height_m:h===''?null:+h,dbh_cm:dbh===''?null:+dbh,root_d_cm:rd===''?null:+rd,co2_kg:c?c.kg:null,estimated:c?c.est:false,created_by:S.session.user.id});});if(!rows.length){el('emsg').innerHTML='<span class="lead">入力された行がありません。</span>';return;}el('emsg').innerHTML='<span class="lead">保存中…</span>';const tids=rows.map(r=>r.tree_id);for(let i=0;i<tids.length;i+=150){await sb.from('measurements').delete().eq('measured_on',date).in('tree_id',tids.slice(i,i+150));}for(let i=0;i<rows.length;i+=200){const {error}=await sb.from('measurements').insert(rows.slice(i,i+200));if(error){el('emsg').innerHTML=`<span class="bad">${esc(error.message)}</span>`;return;}}S.dash=null;await loadSite(S.site);render();setTimeout(()=>{const m=el('emsg');if(m)m.innerHTML=`<span class="ok">${rows.length}本分を保存しました（${date}）。</span>`;},50);}
function csvOut(){const f=S.fields.find(x=>x.id===S.entryField);if(!f)return;const trees=S.trees.filter(t=>t.field_id===f.id);const lines=['記号,樹高m,DBHcm,根元cm'].concat(trees.map(t=>`${t.label||t.epc||''},,,`));const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${f.name}_計測雛形.csv`;a.click();}
function csvIn(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{const txt=String(r.result).replace(/^\ufeff/,'');const lines=txt.split(/\r?\n/).filter(x=>x.trim());const head=lines.shift();const idx={};head.split(',').forEach((h,i)=>idx[h.trim()]=i);const f=S.fields.find(x=>x.id===S.entryField);const byLabel={};S.trees.filter(t=>t.field_id===f.id).forEach(t=>byLabel[(t.label||'').trim()]=t.id);let n=0;lines.forEach(ln=>{const c=ln.split(',');const label=(c[idx['記号']]||'').trim();const tid=byLabel[label];if(!tid)return;const set=(k,col)=>{const e2=document.querySelector(`[data-tid="${tid}"][data-k="${k}"]`);if(e2&&col!=null&&c[col]!=null&&c[col].trim()!=='')e2.value=c[col].trim();};set('h',idx['樹高m']);set('dbh',idx['DBHcm']);set('rd',idx['根元cm']);const cc=co2({height_m:val('h',tid),dbh_cm:val('dbh',tid),root_d_cm:val('rd',tid)});const cell=el('c_'+tid);if(cell)cell.textContent=cc?fmt(cc.kg,2):'–';n++;});el('emsg').innerHTML=`<span class="ok">${n}行を表に取り込みました。確認して「すべて保存」を押してください。</span>`;};r.readAsText(file);}
