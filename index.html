<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ジャパロニア 植林CO₂管理（クラウド版）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --forest:#2f4a32; --forest2:#3f6043; --leaf:#6f8f4e; --gold:#c08a2d;
  --bg:#f6f4ee; --card:#ffffff; --ink:#22281f; --muted:#6b7464; --line:#e3e0d6;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Zen Kaku Gothic New",sans-serif;line-height:1.6}
h1,h2,h3{font-family:"Shippori Mincho",serif;margin:0}
.wrap{max-width:920px;margin:0 auto;padding:16px}
.top{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--forest);color:#fff}
.top h1{font-size:18px;flex:1}
.top .me{font-size:12px;opacity:.9}
button{font-family:inherit;cursor:pointer}
.btn{background:var(--forest);color:#fff;border:none;border-radius:10px;padding:10px 14px;font-weight:700}
.btn.gh{background:#fff;color:var(--forest);border:1px solid var(--forest)}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
.btn.del{background:#fff;color:#a23;border:1px solid #e3b7b7}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:12px 0;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.card h2{font-size:16px;margin-bottom:8px;color:var(--forest)}
label{display:block;font-size:12px;color:var(--muted);margin:8px 0 3px}
input,select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:14px;background:#fff}
.row{display:grid;gap:8px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}.c4{grid-template-columns:repeat(4,1fr)}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:7px 6px;border-bottom:1px solid var(--line);text-align:right}
th:first-child,td:first-child{text-align:left}
.tabs{display:flex;gap:6px;padding:10px 16px 0}
.tab{padding:8px 14px;border-radius:10px 10px 0 0;background:#e9e6dd;font-weight:700;font-size:14px;border:none}
.tab.on{background:var(--card);color:var(--forest)}
.muted{color:var(--muted)}.lead{color:var(--muted);font-size:13px;margin:2px 0 8px}
.pill{display:inline-block;background:#eef0e6;color:var(--forest2);border-radius:999px;padding:2px 9px;font-size:11px;font-weight:700;margin-left:6px}
.list .it{display:flex;align-items:center;gap:8px;padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;background:#fff}
.list .it .nm{flex:1;font-weight:700}
.co2{color:var(--gold);font-weight:700}
.center{min-height:60vh;display:flex;align-items:center;justify-content:center}
.auth{width:340px;max-width:92vw}
.note{font-size:12px;color:var(--muted)}
.bad{color:#a23;font-size:13px;margin-top:6px}
.ok{color:var(--forest2);font-size:13px;margin-top:6px}
.stat{display:inline-block;background:#f1efe7;border-radius:10px;padding:10px 14px;margin:4px 6px 4px 0}
.stat .k{font-size:11px;color:var(--muted)}.stat .v{font-size:20px;font-weight:800;font-family:"Shippori Mincho",serif}
.back{font-size:13px;color:var(--forest);background:none;border:none;padding:0;margin-bottom:8px}
</style>
</head>
<body>
<div id="root"><div class="center"><div class="muted">読み込み中…</div></div></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ============================================================
   ★★★ ここだけ書き換えてください ★★★
   Supabase → Project Settings → API で確認できます
   ============================================================ */
const SUPABASE_URL  = 'https://bieamtjesoaimlmrtmfj.supabase.co';
const SUPABASE_ANON = 'sb_publishable_-paeLD0LA0CMmMmDKhXVEg_YN_Y0OGx';
/* ============================================================ */

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ---- CO₂算定（中根式 2008） ---- */
const P={aL:0.001,bL:0.7197,aB:0.0005,bB:0.7375,aS:0.0007,bS:0.8221,
  d0a:1.2663,d0b:1.6721,wra:0.0011,wrb:1.602,cfL:0.452,cfB:0.417,cfS:0.474,cfR:0.456,k:1.0,dens:500};
function co2(m){
  if(!m) return null;
  let dbh=(m.dbh_cm!=null&&m.dbh_cm!=='')?+m.dbh_cm:null;
  let d0 =(m.root_d_cm!=null&&m.root_d_cm!=='')?+m.root_d_cm:null;
  let est=false;
  if(dbh==null&&d0!=null){ dbh=(d0-P.d0b)/P.d0a; est=true; }
  if(dbh==null) return null;
  if(d0==null) d0=P.d0a*dbh+P.d0b;
  let h_cm=(m.height_m!=null&&m.height_m!=='')?(+m.height_m*100):null;
  if(h_cm==null){ h_cm=41.306*d0+53.998; est=true; }
  const X=dbh*dbh*h_cm;
  const WL=P.aL*Math.pow(X,P.bL),WB=P.aB*Math.pow(X,P.bB),WS=P.aS*Math.pow(X,P.bS);
  const WR=P.wra*Math.pow(d0*d0,P.wrb);
  const kg=(WL*P.cfL+WB*P.cfB+WS*P.cfS+WR*P.cfR)*(44/12)*P.k;
  return {kg,est};
}
const fmt=(n,d=1)=> (n==null||isNaN(n))?'–':Number(n).toLocaleString('ja-JP',{maximumFractionDigits:d,minimumFractionDigits:0});
const esc=s=> (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const el=id=>document.getElementById(id);
const root=el('root');

/* ---- 状態 ---- */
let S={session:null,sites:[],site:null,fields:[],trees:[],meas:[],field:null,tab:'fields'};

/* ---- 起動 ---- */
init();
async function init(){
  if(SUPABASE_URL.includes('ここに')||SUPABASE_ANON.includes('ここに')){
    root.innerHTML=`<div class="wrap"><div class="card"><h2>設定が必要です</h2>
      <p class="lead">このファイル先頭の <b>SUPABASE_URL</b> と <b>SUPABASE_ANON</b> を、Supabaseの「Project Settings → API」の値に書き換えてください。書き換えて保存し、再度開くとログイン画面になります。</p></div></div>`;
    return;
  }
  const {data}=await sb.auth.getSession();
  S.session=data.session;
  sb.auth.onAuthStateChange((_e,sess)=>{ S.session=sess; if(sess){ afterLogin(); } else { render(); } });
  if(S.session) await afterLogin(); else render();
}

async function afterLogin(){
  await loadSites();
  render();
}

/* ---- データ読み込み ---- */
async function loadSites(){
  const {data,error}=await sb.from('sites').select('*').order('name');
  if(error){ alert('読込エラー: '+error.message); return; }
  S.sites=data||[];
  if(!S.site && S.sites.length) S.site=S.sites[0].id;
  if(S.site) await loadSite(S.site);
}
async function loadSite(siteId){
  S.site=siteId;
  const {data:fields}=await sb.from('fields').select('*, parcels(*)').eq('site_id',siteId).order('name');
  S.fields=fields||[];
  const fids=S.fields.map(f=>f.id);
  S.trees = fids.length? (await sb.from('trees').select('*').in('field_id',fids)).data||[] : [];
  const tids=S.trees.map(t=>t.id);
  S.meas = tids.length? (await sb.from('measurements').select('*').in('tree_id',tids).order('measured_on')).data||[] : [];
}

/* 個体ごとの最新計測 */
function latestMeas(treeId){
  const ms=S.meas.filter(m=>m.tree_id===treeId);
  return ms.length? ms[ms.length-1] : null;
}

/* ---- 描画 ---- */
function render(){
  if(!S.session){ renderLogin(); return; }
  const email=S.session.user.email||'';
  let body='';
  if(S.tab==='fields') body=viewFields();
  else body=viewDash();
  root.innerHTML=`
    <div class="top"><h1>ジャパロニア 植林CO₂管理</h1><span class="me">${esc(email)}</span>
      <button class="btn gh sm" id="logout">ログアウト</button></div>
    <div class="tabs">
      <button class="tab ${S.tab==='fields'?'on':''}" data-tab="fields">圃場</button>
      <button class="tab ${S.tab==='dash'?'on':''}" data-tab="dash">ダッシュボード</button>
    </div>
    <div class="wrap">${body}</div>`;
  el('logout').onclick=async()=>{ await sb.auth.signOut(); S.site=null;S.field=null; };
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;render();});
  bind();
}

function renderLogin(){
  root.innerHTML=`<div class="center"><div class="card auth">
    <h2>ログイン</h2>
    <p class="lead">登録済みのメールとパスワードでログインしてください。</p>
    <label>メールアドレス</label><input id="email" type="email" autocomplete="username">
    <label>パスワード</label><input id="pw" type="password" autocomplete="current-password">
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn" id="login" style="flex:1">ログイン</button>
      <button class="btn gh" id="signup">新規登録</button>
    </div>
    <div id="msg"></div>
    <p class="note" style="margin-top:10px">※利用者は管理者がSupabaseの Authentication → Users で追加することもできます（その場合はメール確認不要）。</p>
  </div></div>`;
  el('login').onclick=async()=>{
    const {error}=await sb.auth.signInWithPassword({email:el('email').value.trim(),password:el('pw').value});
    el('msg').innerHTML = error? `<div class="bad">${esc(error.message)}</div>` : `<div class="ok">ログインしました</div>`;
  };
  el('signup').onclick=async()=>{
    const {error}=await sb.auth.signUp({email:el('email').value.trim(),password:el('pw').value});
    el('msg').innerHTML = error? `<div class="bad">${esc(error.message)}</div>` : `<div class="ok">登録しました。確認メールが届く場合があります。届いたら承認後にログインしてください。</div>`;
  };
}

/* ---- 圃場画面 ---- */
function viewFields(){
  const siteOpts=S.sites.map(s=>`<option value="${esc(s.id)}" ${s.id===S.site?'selected':''}>${esc(s.name)}</option>`).join('');
  const siteBar=`<div class="card"><label>拠点</label>
     <div class="row c2"><select id="siteSel">${siteOpts||'<option>（拠点がありません）</option>'}</select>
     <button class="btn gh" id="addSite">＋ 拠点を追加</button></div></div>`;

  if(!S.field){
    const items=S.fields.map(f=>{
      const tn=S.trees.filter(t=>t.field_id===f.id).length;
      return `<div class="it"><span class="nm">${esc(f.name)}</span>
        <span class="muted">${tn}本</span>
        ${f.rfid_managed?'<span class="pill">RFID</span>':''}
        <button class="btn sm" data-open="${f.id}">開く</button></div>`;
    }).join('') || '<p class="muted">この拠点に圃場がありません。「＋圃場を追加」で作成できます。</p>';
    return siteBar+`<div class="card"><h2>圃場一覧</h2><div class="list">${items}</div>
      <button class="btn gh" id="addField" style="margin-top:8px">＋ 圃場を追加</button></div>`;
  }

  // 圃場詳細
  const f=S.fields.find(x=>x.id===S.field);
  const ps=f.parcels||[];
  const total=ps.reduce((a,p)=>a+(+p.area_sqm||0),0);
  const prows=ps.map(p=>`<tr>
    <td><input data-pid="${p.id}" data-k="chiban" value="${esc(p.chiban||'')}" style="width:78px"></td>
    <td><input data-pid="${p.id}" data-k="chimoku" value="${esc(p.chimoku||'')}" style="width:44px"></td>
    <td><input data-pid="${p.id}" data-k="area_sqm" type="number" value="${p.area_sqm??''}" style="width:74px;text-align:right"></td>
    <td><input data-pid="${p.id}" data-k="owner" value="${esc(p.owner||'')}" style="width:100px"></td>
    <td><button class="btn del sm" data-delp="${p.id}">削除</button></td></tr>`).join('')
    || '<tr><td colspan="5" class="muted" style="text-align:center">筆がありません</td></tr>';

  const trees=S.trees.filter(t=>t.field_id===f.id);
  const trows=trees.map(t=>{
    const m=latestMeas(t.id); const c=m?co2(m):null;
    return `<tr><td>${esc(t.label||t.epc||t.id.slice(0,6))}</td>
      <td>${m?fmt(m.height_m,2):'–'}</td><td>${m?fmt(m.dbh_cm,1):'–'}</td>
      <td class="co2">${c?fmt(c.kg,2):'–'}</td>
      <td><button class="btn gh sm" data-meas="${t.id}">計測入力</button></td></tr>`;
  }).join('') || '<tr><td colspan="5" class="muted" style="text-align:center">個体がありません</td></tr>';

  return `<button class="back" id="back">← 圃場一覧へ</button>
   <div class="card"><h2>${esc(f.name)}</h2>
     <div class="row c2"><div><label>所在</label><input id="m_shozai" value="${esc(f.shozai||'')}"></div>
       <div><label>MRV上の扱い</label><input id="m_mrv" value="${esc(f.mrv_status||'')}"></div></div>
     <div class="row c2"><div><label>所有者（まとめ）</label><input id="m_owner" value="${esc(f.owner_summary||'')}"></div>
       <div><label>地積合計㎡（自動でなく手入力可）</label><input id="m_area" type="number" value="${f.area_sqm??''}"></div></div>
     <label style="display:inline-flex;align-items:center;gap:6px;margin-top:8px"><input type="checkbox" id="m_rfid" ${f.rfid_managed?'checked':''} style="width:auto"> RFID管理済（MRV主数値に含める）</label>
     <div><button class="btn gh" id="saveMeta" style="margin-top:8px">圃場情報を保存</button></div>
   </div>

   <div class="card"><h2>登記・筆</h2>
     <table><thead><tr><th>地番</th><th>地目</th><th>地積㎡</th><th>所有者</th><th></th></tr></thead>
       <tbody>${prows}</tbody>
       <tfoot><tr><td style="font-weight:800">合計（${ps.length}筆）</td><td></td><td class="co2">${fmt(total,0)}</td><td>約${(total/10000).toFixed(2)}ha</td><td></td></tr></tfoot></table>
     <div class="row c4" style="margin-top:8px">
       <input id="np_chiban" placeholder="地番"><input id="np_chimoku" placeholder="地目 例:畑">
       <input id="np_area" type="number" placeholder="地積㎡"><input id="np_owner" placeholder="所有者"></div>
     <button class="btn" id="addParcel" style="margin-top:6px">＋ 筆を追加</button>
   </div>

   <div class="card"><h2>個体・計測</h2>
     <table><thead><tr><th>記号</th><th>樹高m</th><th>DBHcm</th><th>CO₂kg</th><th></th></tr></thead>
       <tbody>${trows}</tbody></table>
     <div class="row c2" style="margin-top:8px"><input id="nt_label" placeholder="記号 例:A1"><input id="nt_epc" placeholder="RFID(EPC) 任意"></div>
     <button class="btn" id="addTree" style="margin-top:6px">＋ 個体を追加</button>
     <div id="measbox"></div>
   </div>`;
}

/* ---- ダッシュボード ---- */
function viewDash(){
  const site=S.sites.find(s=>s.id===S.site);
  let totTree=0,totCo2=0;
  const perField=S.fields.map(f=>{
    const ts=S.trees.filter(t=>t.field_id===f.id);
    let c2=0; ts.forEach(t=>{const m=latestMeas(t.id);const c=m?co2(m):null;if(c)c2+=c.kg;});
    totTree+=ts.length; totCo2+=c2;
    return {f,n:ts.length,c2};
  });
  const rfid=perField.filter(x=>x.f.rfid_managed), lay=perField.filter(x=>!x.f.rfid_managed);
  const rsum=rfid.reduce((a,x)=>a+x.n,0), lsum=lay.reduce((a,x)=>a+x.n,0);
  const rows=perField.map(x=>`<tr><td>${esc(x.f.name)}</td><td>${esc(x.f.mrv_status||'-')}</td>
     <td>${x.f.rfid_managed?'○':'—'}</td><td>${x.n}</td><td class="co2">${fmt(x.c2,1)}</td></tr>`).join('');
  return `<div class="card"><h2>${esc(site?site.name:'')} 集計</h2>
    <div><span class="stat"><div class="k">登録本数</div><div class="v">${totTree}</div></span>
      <span class="stat"><div class="k">推定CO₂合計</div><div class="v">${fmt(totCo2,0)}<span style="font-size:12px">kg</span></div></span></div></div>
   <div class="card"><h2>区分別 本数（提出用）</h2>
     <table><tbody>
       ${rfid.map(x=>`<tr><td>${esc(x.f.name)} RFID管理本数</td><td>${x.n}</td></tr>`).join('')}
       <tr style="background:#eef0e6"><td style="font-weight:800">RFID管理済合計</td><td class="co2" style="font-weight:800">${rsum}</td></tr>
       ${lay.map(x=>`<tr><td>${esc(x.f.name)} 配置データ</td><td>${x.n}</td></tr>`).join('')}
       <tr style="background:#f6ead2"><td style="font-weight:800">配置データ含む総数</td><td style="font-weight:800">${rsum+lsum}</td></tr>
     </tbody></table></div>
   <div class="card"><h2>圃場別</h2>
     <table><thead><tr><th>圃場</th><th>MRV扱い</th><th>RFID</th><th>本数</th><th>CO₂kg</th></tr></thead>
       <tbody>${rows||'<tr><td colspan="5" class="muted">圃場がありません</td></tr>'}</tbody></table></div>`;
}

/* ---- イベント ---- */
function bind(){
  const ss=el('siteSel'); if(ss) ss.onchange=async()=>{ S.field=null; await loadSite(ss.value); render(); };
  const aS=el('addSite'); if(aS) aS.onclick=async()=>{
    const name=prompt('拠点名（例：都城）'); if(!name)return;
    const id=prompt('拠点ID（半角英数、例：miyazaki）')||('site_'+Date.now());
    const {error}=await sb.from('sites').insert({id,name}); if(error){alert(error.message);return;}
    await loadSites(); render();
  };
  const aF=el('addField'); if(aF) aF.onclick=async()=>{
    const name=prompt('圃場名（例：圃場1）'); if(!name)return;
    const {error}=await sb.from('fields').insert({site_id:S.site,name}); if(error){alert(error.message);return;}
    await loadSite(S.site); render();
  };
  document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{S.field=b.dataset.open;render();});
  const bk=el('back'); if(bk) bk.onclick=()=>{S.field=null;render();};

  const sm=el('saveMeta'); if(sm) sm.onclick=async()=>{
    const {error}=await sb.from('fields').update({
      shozai:el('m_shozai').value, mrv_status:el('m_mrv').value, owner_summary:el('m_owner').value,
      area_sqm: el('m_area').value===''?null:+el('m_area').value, rfid_managed: el('m_rfid').checked
    }).eq('id',S.field);
    if(error){alert(error.message);return;}
    await loadSite(S.site); render();
  };

  // 筆 編集
  document.querySelectorAll('[data-pid]').forEach(inp=>inp.onchange=async()=>{
    const id=inp.dataset.pid,k=inp.dataset.k; let v=inp.value;
    if(k==='area_sqm') v = v===''?null:+v;
    const {error}=await sb.from('parcels').update({[k]:v}).eq('id',id);
    if(error){alert(error.message);return;}
    await loadSite(S.site); render();
  });
  document.querySelectorAll('[data-delp]').forEach(b=>b.onclick=async()=>{
    if(!confirm('この筆を削除しますか？'))return;
    await sb.from('parcels').delete().eq('id',b.dataset.delp);
    await loadSite(S.site); render();
  });
  const ap=el('addParcel'); if(ap) ap.onclick=async()=>{
    const chiban=el('np_chiban').value.trim(); if(!chiban){alert('地番を入れてください');return;}
    const {error}=await sb.from('parcels').insert({field_id:S.field,chiban,
      chimoku:el('np_chimoku').value, area_sqm: el('np_area').value===''?null:+el('np_area').value, owner:el('np_owner').value});
    if(error){alert(error.message);return;}
    await loadSite(S.site); render();
  };

  // 個体
  const at=el('addTree'); if(at) at.onclick=async()=>{
    const label=el('nt_label').value.trim();
    const {error}=await sb.from('trees').insert({field_id:S.field,label,epc:el('nt_epc').value.trim()||null});
    if(error){alert(error.message);return;}
    await loadSite(S.site); render();
  };
  document.querySelectorAll('[data-meas]').forEach(b=>b.onclick=()=>openMeas(b.dataset.meas));
}

function openMeas(treeId){
  const box=el('measbox'); if(!box)return;
  const t=S.trees.find(x=>x.id===treeId);
  box.innerHTML=`<div class="card" style="background:#f9f8f3"><h3 style="font-size:14px;color:var(--forest)">計測入力：${esc(t.label||t.epc||'')}</h3>
    <div class="row c3">
      <div><label>計測日</label><input id="ms_date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div><label>樹高 (m)</label><input id="ms_h" type="number" step="0.01"></div>
      <div><label>胸高直径 DBH (cm)</label><input id="ms_dbh" type="number" step="0.1"></div>
    </div>
    <div class="row c3"><div><label>根元直径 (cm) 任意</label><input id="ms_rd" type="number" step="0.1"></div>
      <div><label>推定CO₂</label><input id="ms_co2" readonly value="–"></div><div></div></div>
    <div style="margin-top:8px;display:flex;gap:8px"><button class="btn" id="ms_save">保存</button>
      <button class="btn gh" id="ms_cancel">閉じる</button></div></div>`;
  const calc=()=>{const c=co2({height_m:el('ms_h').value,dbh_cm:el('ms_dbh').value,root_d_cm:el('ms_rd').value});
    el('ms_co2').value = c? (fmt(c.kg,2)+' kg'+(c.est?'（推定含む）':'')) : '–';};
  ['ms_h','ms_dbh','ms_rd'].forEach(id=>el(id).oninput=calc);
  el('ms_cancel').onclick=()=>{box.innerHTML='';};
  el('ms_save').onclick=async()=>{
    const c=co2({height_m:el('ms_h').value,dbh_cm:el('ms_dbh').value,root_d_cm:el('ms_rd').value});
    const {error}=await sb.from('measurements').insert({
      tree_id:treeId, measured_on:el('ms_date').value,
      height_m: el('ms_h').value===''?null:+el('ms_h').value,
      dbh_cm: el('ms_dbh').value===''?null:+el('ms_dbh').value,
      root_d_cm: el('ms_rd').value===''?null:+el('ms_rd').value,
      co2_kg: c?c.kg:null, estimated: c?c.est:false,
      created_by: S.session.user.id
    });
    if(error){alert(error.message);return;}
    await loadSite(S.site); render();
  };
}
</script>
</body>
</html>
